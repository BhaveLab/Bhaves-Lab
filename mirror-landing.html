<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consciousness Mirror — Bhavé's Lab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #080808;
  color: #c9a84c;
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}

/* Back arrow */
.back {
  position: fixed;
  top: 24px;
  left: 24px;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: rgba(201, 168, 76, 0.35);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.2s;
  z-index: 10;
}
.back:hover { color: rgba(201, 168, 76, 0.75); }

/* Main container */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  max-width: 560px;
  margin: 0 auto;
  text-align: center;
}

/* Label */
.label {
  font-size: 8px;
  letter-spacing: 0.35em;
  color: rgba(201, 168, 76, 0.45);
  text-transform: uppercase;
  margin-bottom: 28px;
}

/* Divider */
.divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, rgba(201,168,76,0), rgba(201,168,76,0.25), rgba(201,168,76,0));
  margin: 0 auto 28px;
}

/* Headline */
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(28px, 6vw, 38px);
  letter-spacing: 0.03em;
  color: rgba(201, 168, 76, 0.9);
  line-height: 1.3;
  margin-bottom: 28px;
}

/* Body copy */
.body {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(14px, 3vw, 17px);
  line-height: 1.8;
  color: rgba(201, 168, 76, 0.5);
  letter-spacing: 0.03em;
  margin-bottom: 44px;
  max-width: 420px;
}

/* CTA */
.cta {
  display: block;
  border: 1px solid rgba(201, 168, 76, 0.4);
  color: rgba(201, 168, 76, 0.85);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 14px 36px;
  transition: all 0.2s;
  margin-bottom: 16px;
}
.cta:hover {
  border-color: rgba(201, 168, 76, 0.75);
  color: #c9a84c;
  background: rgba(201, 168, 76, 0.04);
}

.price {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(201, 168, 76, 0.3);
  margin-bottom: 48px;
}

/* Realm link */
.realm-link {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(201, 168, 76, 0.25);
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.2s;
}
.realm-link:hover { color: rgba(201, 168, 76, 0.55); }
</style>
</head>
<body>

<a class="back" href="index.html">← Back</a>

<div class="container">
  <div class="label">Consciousness Mirror</div>
  <div class="divider"></div>
  <div class="headline">See what's running.</div>
  <div class="body">
    Eight questions. One reflection.<br>
    The Mirror surfaces the pattern underneath your current state —
    not what you think is happening,
    but what the system is actually doing.
  </div>
  <a class="cta" href="consciousness-mirror.html">Enter the Mirror</a>
  <div class="price">$1</div>
  <a class="realm-link" href="home.html">Enter the Realm →</a>
</div>

</body>
</html>
