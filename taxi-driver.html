// ---- Local persistence (localStorage) — fallback copy so the app still
// works, in a degraded single-device way, if the backend is unreachable ----
const LS_STATUS = "taxi_status";
const LS_ZONES = "taxi_zone_rates";
const LS_PWA_DISMISSED = "taxi_pwa_dismissed";
const LS_BOOKINGS = "taxi_bookings";

function loadStatusLocal() { return localStorage.getItem(LS_STATUS) || "on"; }
function saveStatusLocal(v) { localStorage.setItem(LS_STATUS, v); }

function mergeZones(stored) {
  const merged = JSON.parse(JSON.stringify(DEFAULT_ZONES));
  if (stored) for (const k of ZONE_ORDER) if (stored[k]) Object.assign(merged[k], stored[k]);
  return merged;
}
function loadZonesLocal() {
  try {
    const raw = localStorage.getItem(LS_ZONES);
    return raw ? mergeZones(JSON.parse(raw)) : JSON.parse(JSON.stringify(DEFAULT_ZONES));
  } catch (e) {
    return JSON.parse(JSON.stringify(DEFAULT_ZONES));
  }
}
function saveZonesLocal(zones) { localStorage.setItem(LS_ZONES, JSON.stringify(zones)); }

function loadBookingsLocal() {
  try { return JSON.parse(localStorage.getItem(LS_BOOKINGS) || "[]"); } catch (e) { return []; }
}
function saveBookingsLocal(bookings) { localStorage.setItem(LS_BOOKINGS, JSON.stringify(bookings)); }

// ---- Backend sync (bhaveslab-backend /api/taxi-backend, driverId-scoped) ----
async function apiCall(action, body) {
  const res = await fetch(`${API_BASE}/api/taxi-backend`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, driverId: DRIVER_ID, ...(body || {}) }),
  });
  if (!res.ok) throw new Error("request failed: " + res.status);
  return res.json();
}

async function fetchConfigFromBackend(showToast) {
  try {
    const data = await apiCall("getConfig");
    if (data.status) { state.status = data.status; saveStatusLocal(data.status); }
    state.zones = mergeZones(data.zones);
    saveZonesLocal(state.zones);
    state.syncError = false;
    state.lastChecked = new Date();
    if (showToast) {
      state.justRefreshed = true;
      setTimeout(() => { state.justRefreshed = false; render(); }, 2000);
    }
  } catch (e) {
    state.syncError = true;
  }
  render();
}

async function syncConfigToBackend() {
  try {
    await apiCall("setConfig", { status: state.status, zones: state.zones });
    state.syncError = false;
  } catch (e) {
    state.syncError = true;
  }
  render();
}

async function fetchBookingsFromBackend() {
  try {
    const data = await apiCall("getBookings");
    if (Array.isArray(data.bookings)) {
      state.bookings = data.bookings;
      saveBookingsLocal(state.bookings);
    }
    state.syncError = false;
  } catch (e) {
    state.syncError = true;
  }
  render();
}

function manualRefresh() { fetchConfigFromBackend(true); }

function formatRelativeTime(date) {
  const diffMin = Math.floor((Date.now() - date.getTime()) / 60000);
  if (diffMin < 1) return state.lang === "es" ? "justo ahora" : "just now";
  if (diffMin < 60) return state.lang === "es" ? `hace ${diffMin} min` : `${diffMin} min ago`;
  const diffH = Math.floor(diffMin / 60);
  return state.lang === "es" ? `hace ${diffH} h` : `${diffH}h ago`;
}

let state = {
  lang: "es",
  view: "passenger", // 'passenger' | 'pin' | 'driver' | 'confirmLog'
  pinError: false,
  status: loadStatusLocal(),
  zones: loadZonesLocal(),
  bookings: loadBookingsLocal(),
  pendingLog: null, // booking parsed from a tap-to-log URL, awaiting confirmation
  pwaDismissed: localStorage.getItem(LS_PWA_DISMISSED) === "1",
  pickup: { presetId: null, zone: null, text: "" },
  dropoff: { presetId: null, zone: null, text: "" },
  timeMode: "asap",
  pax: 1,
  showManualAdd: false,
  syncError: false,
  lastChecked: null,
  justRefreshed: false,
};

function t(key) { return I18N[state.lang][key]; }

function syncBannerHtml() {
  if (!state.syncError) return "";
  return `<div class="rounded-xl bg-[#2A0D0D] border border-red-800 text-red-300 text-xs px-4 py-2.5 mb-4">⚠️ ${t("syncError")}</div>`;
}

function passengerHtml() {
  const presets = ZONE_ORDER.map((z) => ({ id: z, zone: z, name: state.zones[z].name }));
  const otro = { id: "otro", zone: null, name: { es: "Otro (escribir)", en: "Other (type below)" } };
  const allPresets = [...presets, otro];

  const renderPresetGroup = (field) => allPresets.map((p) => {
    const selected = state[field].presetId === p.id;

      <div class="text-xl">📲</div>
      <div class="flex-1 min-w-0">

  const fareBody = bothZoned
    ? `<div class="text-3xl font-black yellow">L ${state.zones[zoneKey].hnlMin}–${state.zones[zoneKey].hnlMax}  ·  $${state.zones[zoneKey].usdMin}–$${state.zones[zoneKey].usdMax}</div>
       <div class="text-xs text-neutral-500 mt-1">${t("fareNote")}</div>`
    : `<div class="text-lg font-bold yellow">${t("fareConfirm")}</div>`;

    <div class="flex items-center justify-between pt-6 pb-4">
      <div>
        <div class="text-2xl font-black tracking-tight">🚕 <span class="yellow">TAXI</span> DIRECTO</div>

    ${state.status === "off" && state.timeMode === "asap" ? `<div class="text-xs text-amber-400 -mt-2 mb-4">⚠️ ${t("offDutyAsapWarning")}</div>` : ""}
    ${pwaBanner}

    <div class="rounded-2xl bg-neutral-900 border border-neutral-800 p-4 mb-5 flex items-center gap-3">
      <div class="w-11 h-11 rounded-full bg-yellow-taxi flex items-center justify-center text-xl">🚗</div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-sm truncate">${DRIVER_NAME}</div>
        <div class="text-xs text-neutral-400 truncate">${VEHICLE_MODEL}</div>

    </div>

    <div class="mb-4">
      <label class="block text-xs font-bold uppercase tracking-wide text-neutral-400 mb-2">${t("pickup")}</label>

function selectPreset(field, presetId) {
  const isOtro = presetId === "otro";
  state[field].presetId = presetId;
  state[field].zone = isOtro ? null : presetId;
  state[field].text = isOtro ? "" : state.zones[presetId].name[state.lang];
  render();
  if (isOtro) document.getElementById(field + "-input").focus();
}
function onCustomInput(field, value) {
  state[field].text = value;
  const ctaBtn = document.getElementById("cta-button");
  if (ctaBtn) ctaBtn.style.opacity = state.pickup.text.trim() && state.dropoff.text.trim() ? "1" : "0.5";
}
function setTimeMode(mode) {
  state.timeMode = mode;
  render();
}
function changePax(delta) {
  state.pax = Math.min(4, Math.max(1, state.pax + delta));
  render();
}
function dismissPwaBanner() {
  state.pwaDismissed = true;
  localStorage.setItem(LS_PWA_DISMISSED, "1");
  render();
}

function buildLogUrl(p, d, timeStr, fareStr) {
  const base = window.location.href.split("#")[0].split("?")[0];
  const params = new URLSearchParams({
    log: "1", pu: p, do: d, tm: timeStr, px: String(state.pax), fr: fareStr, lg: state.lang,
  });
  return `${base}?${params.toString()}`;
}

function buildMessage() {
  const p = state.pickup.text || "—";
  const d = state.dropoff.text || "—";
  const timeStr = state.timeMode === "asap" ? t("asap") : ((document.getElementById("time-input") && document.getElementById("time-input").value) || t("later"));
  const bothZoned = state.pickup.zone && state.dropoff.zone;
  let fareStr;
  if (bothZoned) {
    const zoneKey = ZONE_RANK[state.pickup.zone] >= ZONE_RANK[state.dropoff.zone] ? state.pickup.zone : state.dropoff.zone;
    const z = state.zones[zoneKey];
    fareStr = `L ${z.hnlMin}-${z.hnlMax} (~$${z.usdMin}-$${z.usdMax})`;
  } else {
    fareStr = state.lang === "es" ? "Por confirmar" : "To be confirmed";
  }
  const logUrl = buildLogUrl(p, d, timeStr, fareStr);
  if (state.lang === "es") {
    return `Hola ${DRIVER_NAME}! Necesito un viaje.\n🚗 ${VEHICLE_MODEL}\n📍 Origen: ${p}\n🏁 Destino: ${d}\n⏰ Hora: ${timeStr}\n👥 Pasajeros: ${state.pax}\n💰 Tarifa Estimada: ${fareStr}\nPor favor confirme si está disponible.\n\n📋 ${DRIVER_NAME}: toca aquí para guardar esta reserva en tu panel:\n${logUrl}`;
  }
  return `Hi ${DRIVER_NAME}! I need a ride.\n🚗 ${VEHICLE_MODEL}\n📍 Pickup: ${p}\n🏁 Destination: ${d}\n⏰ Time: ${timeStr}\n👥 Passengers: ${state.pax}\n💰 Estimated Fare: ${fareStr}\nPlease confirm if you're available.\n\n📋 ${DRIVER_NAME}: tap here to save this booking to your panel:\n${logUrl}`;
}
function sendRequest() {
  if (!state.pickup.text.trim() || !state.dropoff.text.trim()) return;
  const url = `https://wa.me/${DRIVER_PHONE}?text=${encodeURIComponent(buildMessage())}`;
  window.open(url, "_blank");
}

function openPin() { state.view = "pin"; state.pinError = false; render(); }
function closePin() { state.view = "passenger"; render(); }
function submitPin(value) {
  if (value === DRIVER_PIN) {
    state.view = "driver";
    state.pinError = false;
    render();
    fetchConfigFromBackend(false);
    fetchBookingsFromBackend();
    return;
  }
  state.pinError = true;
  render();
}
function pinHtml() {
  return `
    <div class="fixed inset-0 z-30 flex items-center justify-center bg-black/70 px-6" onclick="if(event.target===this) closePin()">
      <div class="w-full max-w-xs bg-neutral-900 border border-neutral-700 rounded-2xl p-6">
        <div class="text-lg font-black mb-4">${t("pinTitle")}</div>
        <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="${t("pinPlaceholder")}"
          class="w-full text-center text-3xl tracking-[0.5em] rounded-xl bg-neutral-800 border border-neutral-700 px-4 py-3 mb-2"
          onkeydown="if(event.key==='Enter') submitPin(this.value)">
        ${state.pinError ? `<div class="text-red-400 text-xs font-bold mb-2">${t("pinWrong")}</div>` : ""}
        <div class="flex gap-2 mt-3">
          <button class="tap flex-1 rounded-xl border border-neutral-700 py-3 text-sm font-bold" onclick="closePin()">${t("cancel")}</button>
          <button class="tap flex-1 rounded-xl bg-yellow-taxi text-black py-3 text-sm font-black" onclick="submitPin(document.getElementById('pin-input').value)">${t("enter")}</button>
        </div>
      </div>
    </div>
  `;
}

function confirmLogHtml() {
  const b = state.pendingLog;
  if (!b) return passengerHtml();
  return `
    <div class="pt-10">
      <div class="text-center text-4xl mb-3">📋</div>
      <div class="text-xl font-black text-center mb-1">${t("confirmLogTitle")}</div>
      <div class="text-sm text-neutral-400 text-center mb-6">${t("confirmLogSubtitle")}</div>
      <div class="rounded-2xl bg-neutral-900 border border-neutral-800 p-4 mb-6 space-y-2 text-sm">
        <div><span class="text-neutral-500">${t("pickup")}:</span> <b>${b.pickup}</b></div>
        <div><span class="text-neutral-500">${t("dropoff")}:</span> <b>${b.dropoff}</b></div>
        <div><span class="text-neutral-500">${t("time")}:</span> <b>${b.time}</b></div>
        <div><span class="text-neutral-500">${t("passengers")}:</span> <b>${b.pax}</b></div>
        <div><span class="text-neutral-500">${t("fareLabel")}:</span> <b class="yellow">${b.fare}</b></div>
      </div>
      <button class="tap w-full bg-yellow-taxi text-black font-black text-lg py-4 rounded-2xl mb-3" onclick="confirmSaveLog()">${t("saveToBookings")}</button>
      <button class="tap w-full rounded-xl border border-neutral-700 py-3 font-bold text-neutral-400" onclick="discardLog()">${t("discard")}</button>
    </div>
  `;
}
async function confirmSaveLog() {
  const b = state.pendingLog;
  if (!b) return;
  const booking = {
    id: Date.now(),
    pickup: b.pickup, dropoff: b.dropoff, time: b.time, pax: b.pax, fare: b.fare,
    createdAt: new Date().toISOString(),
    status: "pending",
  };
  const bookings = loadBookingsLocal();
  bookings.unshift(booking);
  saveBookingsLocal(bookings);
  state.bookings = bookings;
  state.pendingLog = null;
  state.view = "passenger";
  render();
  try {
    await apiCall("addBooking", { booking });
    state.syncError = false;
  } catch (e) {
    state.syncError = true;
  }
  render();
}
function discardLog() {
  state.pendingLog = null;
  state.view = "passenger";
  render();
}

// ---------------------------------------------------------------------------
// DRIVER PANEL
// ---------------------------------------------------------------------------
function toggleStatus() {
  state.status = state.status === "on" ? "off" : "on";
  saveStatusLocal(state.status);
  render();
  syncConfigToBackend();
}
function adjustZoneRate(zoneKey, field, delta) {
  state.zones[zoneKey][field] = Math.max(0, state.zones[zoneKey][field] + delta);
  saveZonesLocal(state.zones);
  render();
  syncConfigToBackend();
}
function bookingUrl() {
  return window.location.href.split("#")[0].split("?")[0];
}
function closeDriverPanel() {
  state.view = "passenger";
  render();
}
async function shareLink() {
  const url = bookingUrl();
  const text = state.lang === "es" ? `Reserva tu taxi con ${DRIVER_NAME}:` : `Book your ride with ${DRIVER_NAME}:`;
  if (navigator.share) {
    try { await navigator.share({ title: "Taxi Directo", text, url }); } catch (e) {}
  } else if (navigator.clipboard) {
    await navigator.clipboard.writeText(url);
    flashCopied();
  }
}
async function copyLink() {
  const url = bookingUrl();
  if (navigator.clipboard) {
    await navigator.clipboard.writeText(url);
    flashCopied();
  }
}
function flashCopied() {
  const el = document.getElementById("copy-feedback");
  if (!el) return;
  el.textContent = t("copied");
  setTimeout(() => { const e2 = document.getElementById("copy-feedback"); if (e2) e2.textContent = ""; }, 1500);
}

function bookingRowHtml(b) {
  const done = b.status === "done";
  return `
    <div class="rounded-xl bg-neutral-800 border ${done ? "border-neutral-800 opacity-50" : "border-neutral-700"} p-3 mb-2">
      <div class="flex justify-between items-start gap-2">
        <div class="min-w-0">
          <div class="text-sm font-bold truncate">${b.pickup} → ${b.dropoff}</div>
          <div class="text-xs text-neutral-400 mt-0.5">⏰ ${b.time} · 👥 ${b.pax} · 💰 ${b.fare}</div>
        </div>
        <div class="text-[10px] text-neutral-500 shrink-0">${new Date(b.createdAt).toLocaleDateString(state.lang === "es" ? "es-HN" : "en-US")}</div>
      </div>
      <div class="flex gap-2 mt-2">
        <button class="tap flex-1 rounded-lg py-2 text-xs font-bold ${done ? "border border-neutral-700 text-neutral-400" : "bg-green-duty text-black"}" onclick="toggleBookingDone('${b.id}')">
          ${done ? t("markPending") : t("markDone")}
        </button>
        <button class="tap px-3 rounded-lg border border-neutral-700 text-xs font-bold text-red-400" onclick="deleteBooking('${b.id}')">${t("delete")}</button>
      </div>
    </div>`;
}

async function toggleBookingDone(id) {
  const current = state.bookings.find((b) => String(b.id) === String(id));
  const newStatus = current && current.status === "done" ? "pending" : "done";
  const bookings = state.bookings.map((b) => String(b.id) === String(id) ? { ...b, status: newStatus } : b);
  saveBookingsLocal(bookings);
  state.bookings = bookings;
  render();
  try {
    await apiCall("updateBooking", { id, patch: { status: newStatus } });
    state.syncError = false;
  } catch (e) {
    state.syncError = true;
  }
  render();
}
async function deleteBooking(id) {
  const bookings = state.bookings.filter((b) => String(b.id) !== String(id));
  saveBookingsLocal(bookings);
  state.bookings = bookings;
  render();
  try {
    await apiCall("deleteBooking", { id });
    state.syncError = false;
  } catch (e) {
    state.syncError = true;
  }
  render();
}
async function addManualBooking() {
  const pickup = document.getElementById("manual-pickup").value.trim();
  const dropoff = document.getElementById("manual-dropoff").value.trim();
  const time = document.getElementById("manual-time").value.trim() || t("asap");
  const pax = document.getElementById("manual-pax").value || "1";
  const fare = document.getElementById("manual-fare").value.trim() || (state.lang === "es" ? "Por confirmar" : "To be confirmed");
  if (!pickup || !dropoff) return;
  const booking = { id: Date.now(), pickup, dropoff, time, pax, fare, createdAt: new Date().toISOString(), status: "pending" };
  const bookings = [booking, ...state.bookings];
  saveBookingsLocal(bookings);
  state.bookings = bookings;
  state.showManualAdd = false;
  render();
  try {
    await apiCall("addBooking", { booking });
    state.syncError = false;
  } catch (e) {
    state.syncError = true;
  }
  render();
}
function toggleManualAdd() {
  state.showManualAdd = !state.showManualAdd;
  render();
}

        </div>
      ` : ""}
      ${state.bookings.length === 0 && !state.showManualAdd ? `<div class="text-xs text-neutral-500 italic">${t("noBookings")}</div>` : ""}
      ${state.bookings.map(bookingRowHtml).join("")}
    </div>

    <div class="mb-6">
      <div class="text-xs font-bold uppercase tracking-wide text-neutral-400 mb-2">${t("fareSectionTitle")}</div>
      ${zoneRows}
    </div>

    <div class="mb-6">
      <div class="text-xs font-bold uppercase tracking-wide text-neutral-400 mb-2">${t("qrSectionTitle")}</div>
      <div id="qr-holder" class="bg-white rounded-2xl p-4"></div>
    </div>

    <div class="mb-8">
      <div class="text-xs font-bold uppercase tracking-wide text-neutral-400 mb-2">${t("shareSectionTitle")}</div>
      <button class="tap w-full rounded-xl bg-yellow-taxi text-black font-black py-3.5 mb-2" onclick="shareLink()">${t("shareBtn")}</button>
      <button class="tap w-full rounded-xl border border-neutral-700 font-bold py-3" onclick="copyLink()">${t("copyBtn")}</button>
      <div id="copy-feedback" class="text-center text-xs yellow mt-2 h-4"></div>
    </div>

    <button class="tap w-full rounded-xl border border-neutral-700 py-3.5 font-bold text-neutral-400" onclick="closeDriverPanel()">${t("closePanel")}</button>
  `;
}

function renderQr() {
  const holder = document.getElementById("qr-holder");
  if (!holder) return;
  try {
    // This qrcode() wrapper takes the TEXT to encode directly as its first
    // argument (auto-picks QR type/size) — it is not a (typeNumber, level)
    // constructor. Passing a type number here would silently encode that
    // number instead of the URL.
    const qr = qrcode(bookingUrl(), "M");
    holder.innerHTML = qr.createSvgTag(6, 8);
  } catch (e) {
    holder.innerHTML = `<div class="text-black text-xs p-4">QR unavailable: ${e.message}</div>`;
  }
}

// ---------------------------------------------------------------------------
// ROOT RENDER
// ---------------------------------------------------------------------------
function setLang(lang) { state.lang = lang; render(); }

function render() {
  const app = document.getElementById("app");
  if (state.view === "driver") {
    app.innerHTML = driverPanelHtml();
    renderQr();
  } else if (state.view === "confirmLog") {
    app.innerHTML = confirmLogHtml();
  } else {
    app.innerHTML = passengerHtml();
    if (state.view === "pin") {
      document.getElementById("app").insertAdjacentHTML("beforeend", pinHtml());
      const pinInput = document.getElementById("pin-input");
      if (pinInput) pinInput.focus();
    }
  }
}

// If this page was opened from the tap-to-log link inside a WhatsApp booking
// message, pull the booking details out of the URL and show a one-tap
// confirm screen instead of the normal passenger view. This only matters on
// whichever device opens that specific link — in practice, only the
// driver's, since only they receive that message.
function checkForPendingLog() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("log") !== "1") return;
  state.pendingLog = {
    pickup: params.get("pu") || "",
    dropoff: params.get("do") || "",
    time: params.get("tm") || "",
    pax: params.get("px") || "1",
    fare: params.get("fr") || "",
    lang: params.get("lg") || "es",
  };
  state.lang = state.pendingLog.lang === "en" ? "en" : "es";
  state.view = "confirmLog";
  // Clear the params from the address bar so refreshing doesn't re-trigger this
  const cleanUrl = window.location.href.split("?")[0];
  window.history.replaceState({}, "", cleanUrl);
}

checkForPendingLog();
render();
// Silent background refresh from the shared backend on load — status/fares
// can go stale if another device (or the driver's own panel) changed them since
// this page was last opened; falls back to the localStorage copy on failure.
fetchConfigFromBackend(false);
</script>
</body>
</html>
