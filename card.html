<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BHAVÉ</title>
<link rel="icon" type="image/png" href="/icon-512.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #040506;
    color: #c8c8c8;
  }

  canvas#particles {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 1;
    padding: 24px;
  }

  .name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(38px, 10vw, 64px);
    font-weight: normal;
    letter-spacing: 0.18em;
    color: #3dd6c8;
    text-shadow: 0 0 32px rgba(61,214,200,0.35), 0 0 8px rgba(61,214,200,0.2);
    margin-bottom: 6px;
    line-height: 1;
  }

  .title {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(10px, 3vw, 14px);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: 0.85;
    margin-bottom: 40px;
  }

  .qr-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-glow {
    position: absolute;
    inset: -20px;
    border-radius: 12px;
    background: radial-gradient(ellipse at center, rgba(61,214,200,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  #qr canvas,
  #qr img {
    display: block;
    border-radius: 6px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3dd6c8, transparent);
    opacity: 0.4;
    margin-top: 36px;
  }

  .scan-hint {
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3dd6c8;
    opacity: 0.35;
    margin-top: 14px;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="card">
  <div class="name">BHAVÉ</div>
  <div class="title">Source Practitioner</div>
  <div class="qr-wrap">
    <div class="qr-glow"></div>
    <div id="qr"></div>
  </div>
  <div class="divider"></div>
  <div class="scan-hint">scan to book a session</div>
</div>

<!-- QR code library -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
// ── QR Code ──────────────────────────────────────────────────────────────────
const qrSize = Math.min(Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.42), 220);

new QRCode(document.getElementById('qr'), {
  text: 'https://calendly.com/bhaveslab/30min',
  width: qrSize,
  height: qrSize,
  colorDark: '#0a0d0e',
  colorLight: '#e8f5f4',
  correctLevel: QRCode.CorrectLevel.M
});

// ── Particle Field ────────────────────────────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

let W, H, particles;
const PARTICLE_COUNT = 55;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function rand(a, b) { return a + Math.random() * (b - a); }

class Particle {
  constructor() { this.reset(true); }

  reset(initial) {
    this.x = rand(0, W);
    this.y = initial ? rand(0, H) : (Math.random() < 0.5 ? -8 : H + 8);
    this.size = rand(0.6, 3.8);
    this.opacity = rand(0.08, 0.55);
    this.speed = rand(0.08, 0.32);
    this.drift = rand(-0.06, 0.06);
    // star type: 0 = orb, 1 = star-point
    this.type = Math.random() < 0.38 ? 1 : 0;
    // parallax layer (0 slow … 1 fast)
    this.layer = rand(0.15, 1);
    // glow only on larger orbs
    this.glow = this.type === 0 && this.size > 2.4 && Math.random() < 0.5;
    // subtle twinkle
    this.twinkleSpeed = rand(0.004, 0.018);
    this.twinklePhase = rand(0, Math.PI * 2);
  }

  update(t, mx, my) {
    const parallaxX = ((mx / W) - 0.5) * 6 * this.layer;
    const parallaxY = ((my / H) - 0.5) * 6 * this.layer;
    this.x += this.drift + parallaxX * 0.002;
    this.y -= this.speed - parallaxY * 0.001;
    if (this.y < -10) this.reset(false);
    this.currentOpacity = this.opacity * (0.7 + 0.3 * Math.sin(t * this.twinkleSpeed + this.twinklePhase));
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, this.currentOpacity));

    if (this.type === 0) {
      // orb
      if (this.glow) {
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3.5);
        g.addColorStop(0, 'rgba(61,214,200,0.55)');
        g.addColorStop(0.4, 'rgba(61,214,200,0.18)');
        g.addColorStop(1, 'rgba(61,214,200,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
      const g2 = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
      g2.addColorStop(0, '#3dd6c8');
      g2.addColorStop(1, 'rgba(61,214,200,0.1)');
      ctx.fillStyle = g2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 4-point star
      const s = this.size * 1.6;
      ctx.strokeStyle = '#3dd6c8';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - s);
      ctx.lineTo(this.x, this.y + s);
      ctx.moveTo(this.x - s * 0.5, this.y);
      ctx.lineTo(this.x + s * 0.5, this.y);
      ctx.stroke();
      // center dot
      ctx.fillStyle = '#3dd6c8';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

let mouseX = W / 2, mouseY = H / 2;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: true });

function init() {
  resize();
  particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
}

let frame = 0;
function loop() {
  ctx.clearRect(0, 0, W, H);
  frame++;
  for (const p of particles) {
    p.update(frame, mouseX, mouseY);
    p.draw();
  }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); });

init();
loop();
</script>
</body>
</html>
