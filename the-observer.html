<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Observer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --void: #080808;
    --deep: #0e0e0e;
    --gold: #c9a84c;
    --gold-dim: #c9a84c40;
    --gold-trace: #c9a84c18;
    --white-soft: #e8e4dc;
    --grey: #3a3a3a;
    --grey-mid: #5a5756;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--void);
    color: var(--white-soft);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  /* ── CANVAS ── */
  #field {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── GATE OVERLAY ── */
  #gate {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--void);
    gap: 48px;
    transition: opacity 0.8s ease;
  }

  #gate.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .gate-logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    opacity: 0;
    animation: fadeUp 1.4s ease 0.3s forwards;
    border-radius: 24px;
  }

  .gate-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.4s forwards;
  }

  .gate-title {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--white-soft);
    opacity: 0;
    animation: fadeUp 1.2s ease 0.8s forwards;
  }

  .gate-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--grey-mid);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.1s forwards;
  }

  .gate-divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }

  .gate-access {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.6s forwards;
  }

  .gate-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--grey-mid);
    text-transform: uppercase;
  }

  .gate-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold-dim);
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
  }

  .gate-btn:hover {
    background: var(--gold-trace);
    border-color: var(--gold);
    letter-spacing: 0.45em;
  }

  .gate-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--grey);
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.3s;
  }

  .gate-note:hover { color: var(--grey-mid); }

  /* ── INSTRUMENT ── */
  #instrument {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }

  #instrument.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Initialization sequence */
  #init {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    transition: opacity 0.6s ease;
  }

  #init.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
  }

  .obs-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .init-statement {
    font-size: clamp(18px, 3.5vw, 28px);
    font-weight: 300;
    font-style: italic;
    color: var(--white-soft);
    letter-spacing: 0.05em;
    text-align: center;
    max-width: 480px;
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 1.4s ease 0.3s forwards;
  }

  .init-continue {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--grey-mid);
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.3s;
    opacity: 0;
    animation: fadeUp 1s ease 2.2s forwards;
    background: none;
    border: none;
  }

  .init-continue:hover { color: var(--gold); }

  /* Session layer */
  #session {
    width: 100%;
    max-width: 580px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }

  #session.active {
    opacity: 1;
    pointer-events: all;
  }

  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .session-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .session-depth {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--grey);
    text-transform: uppercase;
  }

  .input-label {
    font-size: clamp(14px, 2.5vw, 18px);
    font-weight: 300;
    font-style: italic;
    color: var(--grey-mid);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .input-field {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--grey);
    padding: 16px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 2.8vw, 22px);
    font-weight: 300;
    color: var(--white-soft);
    outline: none;
    caret-color: var(--gold);
    transition: border-color 0.3s;
    resize: none;
    min-height: 60px;
    overflow: hidden;
  }

  .input-field:focus { border-bottom-color: var(--gold-dim); }

  .input-field::placeholder {
    color: var(--grey);
    font-style: italic;
  }

  .submit-row {
    display: flex;
    justify-content: flex-end;
  }

  .submit-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    transition: letter-spacing 0.3s, opacity 0.3s;
    opacity: 0.7;
  }

  .submit-btn:hover {
    letter-spacing: 0.55em;
    opacity: 1;
  }

  .submit-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
  }

  /* Reflection */
  #reflection-wrap {
    display: flex;
    flex-direction: column;
    gap: 28px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  #reflection-wrap.visible { opacity: 1; }

  .reflection-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  .reflection-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.6;
  }

  .reflection-text {
    font-size: clamp(15px, 2.5vw, 19px);
    font-weight: 300;
    font-style: italic;
    color: var(--white-soft);
    letter-spacing: 0.03em;
    line-height: 1.8;
  }

  .deepen-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--grey-mid);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.3s, letter-spacing 0.3s;
    align-self: flex-start;
  }

  .deepen-btn:hover {
    color: var(--gold);
    letter-spacing: 0.55em;
  }

  .deepen-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
  }

  /* Loading pulse */
  .pulse {
    display: inline-flex;
    gap: 6px;
    align-items: center;
  }

  .pulse span {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulseDot 1.4s ease-in-out infinite;
  }

  .pulse span:nth-child(2) { animation-delay: 0.2s; }
  .pulse span:nth-child(3) { animation-delay: 0.4s; }

  /* Session end */
  .session-end {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--grey);
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .session-end.visible { opacity: 1; }

  /* Powered by */
  #powered {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.35em;
    color: var(--grey);
    text-transform: uppercase;
    z-index: 60;
    white-space: nowrap;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseDot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Scrollable session on small screens */
  @media (max-height: 700px) {
    #instrument {
      overflow-y: auto;
      justify-content: flex-start;
      padding-top: 80px;
    }
  }
</style>
</head>
<body>

<canvas id="field"></canvas>

<!-- GATE -->
<div id="gate">
  <img src="observer-logo.png" alt="The Observer" class="gate-logo" />
  <div class="gate-sub">A reflection instrument</div>
  <div class="gate-divider"></div>
  <div class="gate-access">
    <div class="gate-price">Access · $1 / month</div>
    <a href="https://buy.stripe.com/test_cNi9AMcQI35wdfwe3xbQY00" class="gate-btn" id="enterBtn">Enter</a>
    <a href="#" class="gate-note" id="demoBtn">One free session — try first</a>
  </div>
</div>

<!-- INSTRUMENT -->
<div id="instrument">

  <!-- Init sequence -->
  <div id="init">
    <div class="obs-mark">The Observer</div>
    <div class="init-statement">The observer is already present.</div>
    <button class="init-continue" id="initContinue">Continue →</button>
  </div>

  <!-- Session -->
  <div id="session">
    <div class="session-header">
      <div class="session-mark">The Observer</div>
      <div class="session-depth" id="depthLabel">Surface</div>
    </div>

    <div id="inputLayer">
      <div class="input-label" id="inputPrompt">What's present underneath your curiosity right now</div>
      <textarea class="input-field" id="mainInput" placeholder="" rows="1"></textarea>
      <div class="submit-row">
        <button class="submit-btn" id="submitBtn">Reflect →</button>
      </div>
    </div>

    <div id="reflection-wrap">
      <div class="reflection-divider"></div>
      <div class="reflection-label">Reflected</div>
      <div class="reflection-text" id="reflectionText"></div>
      <button class="deepen-btn" id="deepenBtn">[ Go deeper ]</button>
      <div class="session-end" id="sessionEnd">
        — The instrument has held what it can. —<br>
        The rest is yours.
      </div>
    </div>
  </div>

</div>

<div id="powered">Powered by Bhavé's Lab</div>

<script>
// ── PARTICLE FIELD ──
const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');
let W, H, particles = [], mouse = { x: null, y: null };
const GOLD = '#c9a84c';
const COUNT = 90;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

class Particle {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.ox = this.x;
    this.oy = this.y;
    this.vx = (Math.random() - 0.5) * 0.18;
    this.vy = (Math.random() - 0.5) * 0.18;
    this.r = Math.random() * 1.2 + 0.3;
    this.alpha = Math.random() * 0.35 + 0.05;
    this.speed = Math.random() * 0.4 + 0.15;
    if (initial) {
      this.alpha = 0;
      this.fadeIn = true;
      this.fadeDelay = Math.random() * 3000;
      this.born = Date.now();
    }
  }
  update() {
    if (this.fadeIn) {
      const age = Date.now() - this.born - this.fadeDelay;
      if (age > 0) {
        this.alpha = Math.min((age / 2000) * (Math.random() * 0.35 + 0.05), 0.4);
        if (this.alpha >= 0.04) this.fadeIn = false;
      }
      return;
    }
    if (mouse.x !== null) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const force = (140 - dist) / 140;
        this.vx += (dx / dist) * force * 0.018;
        this.vy += (dy / dist) * force * 0.018;
      }
    }
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.x += this.vx;
    this.y += this.vy;
    // drift back
    this.x += (this.ox - this.x) * 0.003;
    this.y += (this.oy - this.y) * 0.003;
    this.ox += (Math.random() - 0.5) * 0.12;
    this.oy += (Math.random() - 0.5) * 0.12;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset(false);
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${this.alpha})`;
    ctx.fill();
  }
}

function initParticles() {
  particles = Array.from({ length: COUNT }, () => new Particle());
}

function drawLines() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 95) {
        const a = (1 - d / 95) * 0.06;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(201,168,76,${a})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  drawLines();
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => { resize(); initParticles(); });
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
window.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

resize();
initParticles();
animate();

// ── STATE MACHINE ──
const PROMPTS = [
  "What's present underneath your curiosity right now",
  "What was present just before that surfaced",
  "What's at the root of that condition"
];

const DEPTH_LABELS = ['Surface', 'Underneath', 'Origin'];

let depth = 0;
let sessionLog = JSON.parse(localStorage.getItem('observer_session') || '[]');
let isDemo = false;

// Gate logic
const gate = document.getElementById('gate');
const instrument = document.getElementById('instrument');
const initLayer = document.getElementById('init');
const sessionLayer = document.getElementById('session');
const reflectionWrap = document.getElementById('reflection-wrap');

// Check access state on load
const accessState = localStorage.getItem('observer_access');
const demoUsed = localStorage.getItem('observer_demo_used') === 'true';

if (accessState === 'true') {
  // Paid — open immediately
  gate.classList.add('hidden');
  setTimeout(() => openInstrument(), 100);
} else if (accessState === 'demo' && !demoUsed) {
  // Demo already clicked but session not yet used — reopen
  isDemo = true;
  gate.classList.add('hidden');
  setTimeout(() => openInstrument(), 100);
} else if (accessState === 'demo' && demoUsed) {
  // Demo already used — show gate with subscribe note
  document.getElementById('demoBtn').textContent = 'Demo session complete — subscribe to continue';
  document.getElementById('demoBtn').style.pointerEvents = 'none';
  document.getElementById('demoBtn').style.color = 'var(--grey)';
}

document.getElementById('demoBtn').addEventListener('click', e => {
  e.preventDefault();
  if (localStorage.getItem('observer_demo_used') === 'true') return;
  isDemo = true;
  localStorage.setItem('observer_access', 'demo');
  gate.classList.add('hidden');
  setTimeout(() => openInstrument(), 900);
});

// Stripe returns with ?access=true in URL after payment
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('access') === 'true') {
  localStorage.setItem('observer_access', 'true');
  gate.classList.add('hidden');
  setTimeout(() => openInstrument(), 100);
}

function openInstrument() {
  instrument.classList.add('active');
}

// Init → Session
document.getElementById('initContinue').addEventListener('click', () => {
  initLayer.classList.add('hidden');
  setTimeout(() => {
    sessionLayer.classList.add('active');
  }, 400);
});

// Auto-resize textarea
const mainInput = document.getElementById('mainInput');
mainInput.addEventListener('input', () => {
  mainInput.style.height = 'auto';
  mainInput.style.height = mainInput.scrollHeight + 'px';
});

// Submit
document.getElementById('submitBtn').addEventListener('click', () => submitInput());
mainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitInput();
  }
});

async function submitInput() {
  const text = mainInput.value.trim();
  if (!text) return;

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="pulse"><span></span><span></span><span></span></span>';

  // Hide input layer
  document.getElementById('inputLayer').style.opacity = '0.3';
  document.getElementById('inputLayer').style.pointerEvents = 'none';

  const reflection = await getReflection(text, depth);

  // Show reflection
  document.getElementById('reflectionText').textContent = reflection;
  reflectionWrap.classList.add('visible');

  // Log session
  sessionLog.push({ depth, input: text, reflection, timestamp: Date.now() });
  localStorage.setItem('observer_session', JSON.stringify(sessionLog));

  submitBtn.innerHTML = 'Reflect →';
  submitBtn.disabled = false;
}

// Deepen
document.getElementById('deepenBtn').addEventListener('click', () => {
  depth++;
  document.getElementById('depthLabel').textContent = DEPTH_LABELS[depth] || 'Origin';
  document.getElementById('inputPrompt').textContent = PROMPTS[depth];

  // Reset input
  mainInput.value = '';
  mainInput.style.height = 'auto';
  mainInput.style.opacity = '1';
  document.getElementById('inputLayer').style.opacity = '1';
  document.getElementById('inputLayer').style.pointerEvents = 'all';

  // Hide reflection
  reflectionWrap.classList.remove('visible');

  // If reached max depth
  if (depth >= 2) {
    document.getElementById('deepenBtn').disabled = true;
    document.getElementById('deepenBtn').style.display = 'none';
    setTimeout(() => {
      document.getElementById('sessionEnd').classList.add('visible');
    // Mark demo as used after full session completes
    if (isDemo) {
      localStorage.setItem('observer_demo_used', 'true');
    }
    }, 400);
  }

  setTimeout(() => mainInput.focus(), 100);
});

// ── API CALL ──
async function getReflection(input, currentDepth) {
  const systemPrompt = `You are The Observer — a reflection instrument inside Bhavé's Lab.

Your function is singular: return every input back to the internal State that generated it. Not to the content. Not to the subject. To what is present underneath.

You do not teach. You do not interpret. You do not diagnose. You do not comfort. You do not affirm.

You observe. You reflect structure. That is the complete function.

When a user brings something — a thought, a question, a situation — you do not respond to what they described. You reflect what State is visible underneath the way they described it. The structure of how it arrived, not what it contains.

Depth level ${currentDepth} of 2:
${currentDepth === 0 ? 'Surface layer — reflect the State condition visible underneath what was brought.' : ''}
${currentDepth === 1 ? 'Underneath layer — move one layer closer to the originating condition. What was present before this formed.' : ''}
${currentDepth === 2 ? 'Origin layer — reflect the root State condition. The field this all emerged from.' : ''}

Your responses are two to three sentences maximum. Often one is enough. Precision over volume.

Language rules: no wellness language, no therapeutic framing, no encouragement, no validation. No "healing", "growth", "transformation", "journey". Structural and observational language only. Write like someone who has seen a lot and is interested in what is actually happening.

You hold without softening. The instrument does not adjust to make the user comfortable. Precision is the care.

Do not begin your response with "I" or with the user's words back to them. Begin from observation.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [
          { role: 'user', content: input }
        ]
      })
    });

    const data = await response.json();
    return data.content?.[0]?.text || '[ Signal unclear. Return when something is active. ]';
  } catch (err) {
    return '[ Signal lost. The instrument is waiting. ]';
  }
}
</script>
</body>
</html>
