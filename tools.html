<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Realm — Bhavé's Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --void:    #080808;
  --mid:     #0f0f0f;
  --border:  #1e1e1e;
  --gold:    #c9a84c;
  --gold-d:  #7a6028;
  --gold-b:  #e8c570;
  --teal:    #4ecdc4;
  --muted:   #484848;
  --dim:     #2a2a2a;
  --mono:    'JetBrains Mono', monospace;
  --serif:   'Cormorant Garamond', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--void); overflow:hidden; font-family:var(--mono); }

/* ── NAV ──────────────────────────────────────────────────── */
.bl-nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 22px;
  background:rgba(8,8,8,0.9); backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(201,168,76,0.06);
}
.bl-nav-brand {
  font-family:var(--serif); font-weight:300; font-size:12px;
  letter-spacing:0.3em; color:rgba(201,168,76,0.6);
  text-transform:uppercase; text-decoration:none;
}
.bl-hamburger {
  background:none; border:none; cursor:pointer;
  padding:4px; display:flex; flex-direction:column; gap:5px; z-index:201;
}
.bl-hamburger span {
  display:block; width:20px; height:1px;
  background:rgba(201,168,76,0.5); transition:all 0.3s ease; transform-origin:center;
}
.bl-hamburger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg); background:rgba(201,168,76,0.9); }
.bl-hamburger.open span:nth-child(2) { opacity:0; }
.bl-hamburger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg); background:rgba(201,168,76,0.9); }
.bl-menu {
  position:fixed; inset:0; z-index:199;
  background:rgba(8,8,8,0.97);
  display:flex; flex-direction:column; justify-content:center;
  padding:80px 32px 48px;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.bl-menu.open { opacity:1; pointer-events:all; }
.bl-nav-section { margin-bottom:24px; opacity:0; transform:translateY(8px); transition:opacity 0.3s,transform 0.3s; }
.bl-menu.open .bl-nav-section:nth-child(1){opacity:1;transform:translateY(0);transition-delay:0.05s;}
.bl-menu.open .bl-nav-section:nth-child(2){opacity:1;transform:translateY(0);transition-delay:0.1s;}
.bl-menu.open .bl-nav-section:nth-child(3){opacity:1;transform:translateY(0);transition-delay:0.15s;}
.bl-menu.open .bl-nav-section:nth-child(4){opacity:1;transform:translateY(0);transition-delay:0.2s;}
.bl-menu.open .bl-nav-section:nth-child(5){opacity:1;transform:translateY(0);transition-delay:0.25s;}
.bl-nav-main {
  font-family:var(--serif); font-weight:300; font-size:24px;
  letter-spacing:0.06em; color:rgba(201,168,76,0.85);
  text-decoration:none; display:block; margin-bottom:8px;
}
.bl-nav-subs { display:flex; flex-direction:column; gap:5px; padding-left:14px; border-left:1px solid rgba(201,168,76,0.1); }
.bl-nav-sub {
  font-size:8px; letter-spacing:0.18em; color:rgba(201,168,76,0.3);
  text-decoration:none; text-transform:uppercase; transition:color 0.2s;
}
.bl-nav-sub:hover { color:rgba(201,168,76,0.65); }
.bl-nav-divider { width:100%; height:1px; background:rgba(201,168,76,0.05); margin-bottom:24px; }
.bl-nav-cta {
  font-size:8px; letter-spacing:0.22em; color:rgba(201,168,76,0.8);
  text-decoration:none; text-transform:uppercase;
  border:1px solid rgba(201,168,76,0.28); padding:10px 22px; display:inline-block;
}
.bl-nav-home {
  font-size:7px; letter-spacing:0.18em; color:rgba(201,168,76,0.2);
  text-decoration:none; text-transform:uppercase; margin-top:20px; display:block;
}

/* ── CANVAS ───────────────────────────────────────────────── */
#cv-container {
  position:fixed; top:50px; left:0; right:0; bottom:0;
}
#cv-container canvas { display:block; }

/* ── PLANET PANEL ─────────────────────────────────────────── */
.planet-panel {
  position:fixed; bottom:0; left:0; right:0; z-index:150;
  background:rgba(8,8,8,0.97); border-top:1px solid rgba(201,168,76,0.12);
  padding:28px 28px 40px;
  transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  max-height:65vh; overflow-y:auto;
}
.planet-panel.open { transform:translateY(0); }
.panel-close {
  position:absolute; top:16px; right:20px;
  background:none; border:none; cursor:pointer;
  font-family:var(--mono); font-size:11px; letter-spacing:0.1em;
  color:rgba(201,168,76,0.3); transition:color 0.2s;
}
.panel-close:hover { color:rgba(201,168,76,0.7); }
.panel-orbit-label {
  font-size:7px; letter-spacing:0.28em; color:rgba(201,168,76,0.35);
  text-transform:uppercase; margin-bottom:10px;
}
.panel-name {
  font-family:var(--serif); font-weight:300; font-size:28px;
  letter-spacing:0.04em; color:rgba(201,168,76,0.9);
  margin-bottom:16px; line-height:1.2;
}
.panel-divider {
  width:32px; height:1px;
  background:rgba(201,168,76,0.2); margin-bottom:16px;
}
.panel-desc {
  font-family:var(--serif); font-weight:300; font-size:15px;
  line-height:1.8; color:rgba(201,168,76,0.5);
  margin-bottom:28px; max-width:480px;
}
.panel-cta {
  display:inline-block;
  border:1px solid rgba(201,168,76,0.35); padding:12px 28px;
  font-family:var(--mono); font-size:8px; letter-spacing:0.22em;
  color:rgba(201,168,76,0.8); text-decoration:none;
  text-transform:uppercase; transition:all 0.2s; cursor:pointer;
  background:none;
}
.panel-cta:hover { border-color:rgba(201,168,76,0.7); color:var(--gold); background:rgba(201,168,76,0.04); }
.panel-cta.dim { opacity:0.4; cursor:default; pointer-events:none; }
.panel-price {
  font-size:8px; letter-spacing:0.2em; color:rgba(201,168,76,0.25);
  margin-left:16px; vertical-align:middle;
}
</style>
</head>
<body>

<nav class="bl-nav">
  <a class="bl-nav-brand" href="index.html">Bhavé's Lab</a>

    <span></span><span></span><span></span>

  <div class="bl-nav-section">

      <a class="bl-nav-sub" href="mirror-landing.html" onclick="closeMenu()">Consciousness Mirror</a>
      <a class="bl-nav-sub" href="study-yourself-landing.html" onclick="closeMenu()">Study Yourself</a>
    </div>
  </div>
  <div class="bl-nav-divider"></div>
  <div class="bl-nav-section">
    <a class="bl-nav-cta" href="home.html#book" onclick="closeMenu()">Book a Session</a>
    <a class="bl-nav-home" href="index.html" onclick="closeMenu()">← Back to the Field</a>
  </div>
</div>

<div id="cv-container"></div>

<!-- PLANET PANEL -->
<div class="planet-panel" id="planet-panel">
  <button class="panel-close" onclick="closePanel()">✕ CLOSE</button>
  <div class="panel-orbit-label" id="panel-orbit"></div>
  <div class="panel-name" id="panel-name"></div>
  <div class="panel-divider"></div>
  <div class="panel-desc" id="panel-desc"></div>
  <div id="panel-actions"></div>
</div>

<script>
const INNER_PLANETS = [
  { id:'mirror', name:'The Mirror', orbit:'INNER · TOOL', desc:'A real-time State check. Eight questions. The Mirror surfaces the pattern underneath your current state — not what you think is happening, but what the system is actually doing.', cta:'Enter the Mirror', href:'mirror-landing.html', price:'$1', color:[78,205,196], angle:-Math.PI/2, live:true },
  { id:'study', name:'Study Yourself', orbit:'INNER · COURSE', desc:'Sixty questions across ten sections. The system reads your responses for structural pattern — not what you say, but how you\'re organized. Your Pattern Map is generated at completion.', cta:'Begin', href:'study-yourself-landing.html', price:'$25', color:[160,207,108], angle:0, live:true },
  { id:'thread', name:'The Thread', orbit:'INNER · INSTRUMENT', desc:'Variable accumulation over time. You bring what happened, what shifted, what connection your system made. The Thread traces what moves through you across changing conditions.', cta:'Enter The Thread', href:'#', price:'Free', color:[201,168,76], angle:Math.PI/2, live:false, coming:'Opening soon.' },
  { id:'pattern', name:'Pattern Immersion', orbit:'INNER · SESSION', desc:'Deep immersion work. Bhavé present. The full session — biofeedback baseline, framework application, hypnosis, post-read. Nothing left out.', cta:'Book a Session', href:'https://calendly.com/bhaveslab', price:'$2,400', color:[228,210,130], angle:Math.PI, live:true }
];

const OUTER_PLANETS = [
  { id:'study-session', name:'Study Session', orbit:'OUTER · SESSION', desc:'One session. Structured awareness work. You bring a situation — the session moves through it with precision. A calibrated entry point into the deeper work.', cta:'Book', href:'https://calendly.com/bhaveslab', price:'$225', color:[92,208,175], angle:-Math.PI/4, live:true },
  { id:'inner-mining', name:'Inner Mining', orbit:'OUTER · SESSION', desc:'Deep dive into the operating pattern. A full session dedicated to excavation — what runs beneath the surface decisions, the recurring outcomes, the persistent loops.', cta:'Book', href:'https://calendly.com/bhaveslab', price:'$500', color:[118,210,148], angle:Math.PI/4, live:true },
  { id:'gospel', name:'Gospel Immersion', orbit:'OUTER · EXPERIENCE', desc:'The full session in a sovereign container. Tulum. Your space or a secured environment. Nothing scheduled around it — the work runs as long as the work requires.', cta:'Learn More', href:'gospel-immersion.html', price:'$750 — $500', color:[193,188,85], angle:Math.PI+Math.PI/4, live:true },
  { id:'workshops', name:'Workshops', orbit:'OUTER · GROUP', desc:'Group sessions. The framework applied in a collective field. Dates and formats announced as they form.', cta:'View Workshops', href:'home.html#workshops', price:'Variable', color:[88,212,200], angle:Math.PI-Math.PI/4, live:true }
];

let pulses = [];
let _innerR = 0;
function triggerSourcePulse() {
  let sR = _innerR * 0.22, mR = sR + _innerR * 0.6;
  pulses.push({ r:sR, startR:sR, maxR:mR });
  setTimeout(()=>pulses.push({ r:sR, startR:sR, maxR:mR }), 180);
  setTimeout(()=>pulses.push({ r:sR, startR:sR, maxR:mR }), 360);
}

new p5(function(p) {
  const NAV_H = 50;
  let W, H, cx, cy, innerR, outerR, bgParticles = [], hoveredPlanet = null, t = 0;

  p.setup = function() {
    W = window.innerWidth; H = window.innerHeight - NAV_H;
    let cv = p.createCanvas(W, H); cv.parent('cv-container');
    p.colorMode(p.RGB,255,255,255,255); p.smooth();
    cx = W/2; cy = H/2;
    let m = Math.min(W,H); innerR = m*0.27; outerR = m*0.44;
    _innerR = innerR;
    for (let i=0;i<120;i++) bgParticles.push({ x:p.random(W), y:p.random(H), vx:p.random(-0.15,0.15), vy:p.random(-0.15,0.15), sz:p.random(0.3,1.2), alpha:p.random(8,35), col:p.random()>0.5?[201,168,76]:[78,205,196] });
  };

  p.windowResized = function() {
    W = window.innerWidth; H = window.innerHeight - NAV_H;
    p.resizeCanvas(W,H); cx=W/2; cy=H/2;
    let m=Math.min(W,H); innerR=m*0.27; outerR=m*0.44;
    _innerR = innerR;
  };

  p.draw = function() {
    p.background(8,8,8,30); t+=0.006;
    for (let bp of bgParticles) { bp.x+=bp.vx; bp.y+=bp.vy; if(bp.x<0)bp.x=W; if(bp.x>W)bp.x=0; if(bp.y<0)bp.y=H; if(bp.y>H)bp.y=0; p.noStroke(); p.fill(bp.col[0],bp.col[1],bp.col[2],bp.alpha); p.ellipse(bp.x,bp.y,bp.sz,bp.sz); }
    p.noFill(); p.stroke(201,168,76,10); p.strokeWeight(0.5); p.ellipse(cx,cy,innerR*2,innerR*2);
    p.stroke(78,205,196,7); p.ellipse(cx,cy,outerR*2,outerR*2);
    let p2=p.sin(t*0.7)*8; p.stroke(228,210,130,5); p.strokeWeight(0.5); p.ellipse(cx,cy,(innerR*0.22+40+p2)*2,(innerR*0.22+40+p2)*2);
    let p1=p.sin(t*1.2)*5; p.stroke(228,210,130,12); p.ellipse(cx,cy,(innerR*0.22+20+p1)*2,(innerR*0.22+20+p1)*2);
    p.stroke(228,210,130,22); p.ellipse(cx,cy,innerR*0.22*2,innerR*0.22*2);
    p.fill(228,210,130,200); p.noStroke(); p.ellipse(cx,cy,6,6);
    p.fill(228,210,130,55); p.textFont('JetBrains Mono,monospace'); p.textSize(7); p.textAlign(p.CENTER,p.CENTER); p.text('SOURCE',cx,cy+innerR*0.22+14);
    for (let i=pulses.length-1;i>=0;i--) { let pu=pulses[i]; let prog=(pu.r-pu.startR)/(pu.maxR-pu.startR); p.noFill(); p.stroke(228,210,130,(1-prog)*70); p.strokeWeight(1); p.ellipse(cx,cy,pu.r*2,pu.r*2); pu.r+=pu.maxR*0.022; if(pu.r>=pu.maxR)pulses.splice(i,1); }
    drawPlanets(INNER_PLANETS,innerR,0.004,8); drawPlanets(OUTER_PLANETS,outerR,-0.003,6);
  };

  function drawPlanets(planets,radius,driftSpeed,baseSize) {
    for (let i=0;i<planets.length;i++) {
      let pl=planets[i], drift=p.sin(t*0.8+i*1.3)*0.04, angle=pl.angle+t*driftSpeed+drift;
      let px=cx+radius*Math.cos(angle), py=cy+radius*Math.sin(angle);
      pl._px=px; pl._py=py; pl._r=baseSize+6;
      let isH=(hoveredPlanet===pl.id), col=pl.color;
      p.noFill(); p.stroke(col[0],col[1],col[2],isH?55:(pl.live?18:8)); p.strokeWeight(0.5); p.ellipse(px,py,(baseSize+(isH?14:6))*2,(baseSize+(isH?14:6))*2);
      p.fill(col[0],col[1],col[2],isH?220:(pl.live?150:60)); p.noStroke(); p.ellipse(px,py,baseSize*2,baseSize*2);
      let dx=px-cx,dy=py-cy,d=Math.sqrt(dx*dx+dy*dy);
      p.fill(col[0],col[1],col[2],isH?130:(pl.live?55:22)); p.textFont('JetBrains Mono,monospace'); p.textSize(radius===innerR?7.5:6.5); p.textAlign(p.CENTER,p.CENTER);
      p.text(pl.name.toUpperCase(), px+(dx/d)*(baseSize+14), py+(dy/d)*(baseSize+14));
    }
  }

  p.mouseMoved = function() {
    hoveredPlanet=null;
    if(Math.sqrt(Math.pow(p.mouseX-cx,2)+Math.pow(p.mouseY-cy,2))<innerR*0.22+44){document.body.style.cursor='pointer';return;}
    for (let pl of [...INNER_PLANETS,...OUTER_PLANETS]) { if(!pl._px)continue; if(Math.sqrt(Math.pow(p.mouseX-pl._px,2)+Math.pow(p.mouseY-pl._py,2))<pl._r+16){hoveredPlanet=pl.id;document.body.style.cursor='pointer';return;} }
    document.body.style.cursor='default';
  };

  p.mousePressed = function() {
    if(Math.sqrt(Math.pow(p.mouseX-cx,2)+Math.pow(p.mouseY-cy,2))<innerR*0.22+44){triggerSourcePulse();openSourcePanel();return false;}
    for (let pl of [...INNER_PLANETS,...OUTER_PLANETS]) { if(!pl._px)continue; if(Math.sqrt(Math.pow(p.mouseX-pl._px,2)+Math.pow(p.mouseY-pl._py,2))<pl._r+18){openPanel(pl);return false;} }
  };

  p.touchStarted = function() {
    if(document.getElementById('planet-panel').classList.contains('open'))return;
    let tx=p.touches.length>0?p.touches[0].x:p.mouseX, ty=p.touches.length>0?p.touches[0].y:p.mouseY;
    if(Math.sqrt(Math.pow(tx-cx,2)+Math.pow(ty-cy,2))<innerR*0.22+44){triggerSourcePulse();openSourcePanel();return false;}
    for (let pl of [...INNER_PLANETS,...OUTER_PLANETS]) { if(!pl._px)continue; if(Math.sqrt(Math.pow(tx-pl._px,2)+Math.pow(ty-pl._py,2))<pl._r+22){openPanel(pl);return false;} }
  };

}, document.getElementById('cv-container'));

function openSourcePanel() {
  document.getElementById('panel-orbit').textContent = '';
  document.getElementById('panel-name').textContent = 'SOURCE';
  document.getElementById('panel-desc').textContent = 'I Am';
  document.getElementById('panel-actions').innerHTML = '';
  document.getElementById('planet-panel').classList.add('open');
}
function openPanel(pl) {
  document.getElementById('panel-orbit').textContent = pl.orbit;
  document.getElementById('panel-name').textContent = pl.name;
  document.getElementById('panel-desc').textContent = pl.coming || pl.desc;
  document.getElementById('panel-actions').innerHTML = pl.coming
    ? `<span style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.18em;color:rgba(201,168,76,0.25);text-transform:uppercase;">${pl.coming}</span>`
    : `<a class="panel-cta" href="${pl.href}">${pl.cta}</a><span class="panel-price">${pl.price}</span>`;
  document.getElementById('planet-panel').classList.add('open');
}
function closePanel() { document.getElementById('planet-panel').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape'){closePanel();closeMenu();} });
function toggleMenu() { document.getElementById('bl-menu').classList.toggle('open'); document.getElementById('hamburger').classList.toggle('open'); document.body.style.overflow=document.getElementById('bl-menu').classList.contains('open')?'hidden':''; }
function closeMenu() { document.getElementById('bl-menu').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); document.body.style.overflow=''; }
</script>
</body>
