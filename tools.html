<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools — Bhavé's Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Tenor+Sans&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --obsidian: #080808; --deep: #0d0d0d;
  --gold: #c9a96e; --gold-light: #e8c98a; --gold-dim: #8a6e3e;
  --ash: #888888; --white: #f5f3ef;
}
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--obsidian); color: var(--white); font-family: 'Tenor Sans', sans-serif; cursor: none; }

.cursor { position: fixed; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: difference; transform: translate(-50%,-50%); }
.cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(201,169,110,0.4); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s, border-color 0.3s; }
.cursor-ring.hovering { width: 60px; height: 60px; border-color: var(--gold); }

#cosmos { position: fixed; inset: 0; z-index: 0; }
.grain { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 128px; mix-blend-mode: overlay; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; }
nav::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,8,8,0.9) 0%, transparent 100%); pointer-events: none; }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 300; letter-spacing: 0.3em; color: var(--white); text-transform: uppercase; position: relative; z-index: 1; text-decoration: none; opacity: 0; animation: fadeUp .8s ease .3s forwards; }
.nav-logo span { color: var(--gold); }
.nav-back { position: relative; z-index: 1; font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--ash); text-decoration: none; text-transform: uppercase; transition: color 0.3s; cursor: none; opacity: 0; animation: fadeUp .8s ease .5s forwards; }
.nav-back:hover { color: var(--gold); }

/* HINT */
.hint { position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%); z-index: 50; text-align: center; opacity: 0; animation: fadeUp 1s ease 1.5s forwards; pointer-events: none; }
.hint span { font-family: 'Space Mono', monospace; font-size: 0.5rem; letter-spacing: 0.3em; color: var(--ash); text-transform: uppercase; }
.hint-line { width: 1px; height: 30px; background: linear-gradient(to bottom, var(--gold-dim), transparent); margin: 0.5rem auto 0; animation: scrollPulse 2s ease-in-out infinite; }
@keyframes scrollPulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

/* FIELD — the planet canvas layer */
#field { position: fixed; inset: 0; z-index: 10; }

/* PLANET */
.planet { position: absolute; transform: translate(-50%, -50%); cursor: none; z-index: 20; }
.planet-core {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: transform 0.6s cubic-bezier(0.23,1,0.32,1), box-shadow 0.6s ease;
}
.planet-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.2);
  animation: rotateSlow 20s linear infinite;
  pointer-events: none;
}
.planet-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }
.planet-label {
  position: absolute;
  bottom: -2rem;
  left: 50%; transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem; letter-spacing: 0.22em;
  color: var(--ash); text-transform: uppercase;
  white-space: nowrap;
  transition: color 0.3s, opacity 0.3s;
  pointer-events: none;
}
.planet-status {
  position: absolute;
  top: -1.8rem;
  left: 50%; transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 0.4rem; letter-spacing: 0.2em;
  color: var(--gold); text-transform: uppercase;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.planet:hover .planet-status { opacity: 1; }
.planet:hover .planet-label { color: var(--gold); }
.planet:hover .planet-core { transform: scale(1.15); box-shadow: 0 0 40px rgba(201,169,110,0.25); }
.planet.dim .planet-core { opacity: 0.3; filter: grayscale(0.8); }
.planet.dim .planet-label { opacity: 0.3; }
.planet.dim:hover .planet-core { transform: none; box-shadow: none; }

/* EXPANDED PANEL */
#panel {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(8,8,8,0.96);
  backdrop-filter: blur(16px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
#panel.open { opacity: 1; pointer-events: all; }

.panel-box {
  width: min(680px, 92vw);
  border: 1px solid rgba(201,169,110,0.18);
  background: var(--deep);
  padding: 0;
  position: relative;
  transform: translateY(24px) scale(0.98);
  transition: transform 0.5s cubic-bezier(0.23,1,0.32,1);
  overflow: hidden;
}
#panel.open .panel-box { transform: translateY(0) scale(1); }

.panel-top { padding: 3.5rem 3.5rem 0; }
.panel-tag { font-family: 'Space Mono', monospace; font-size: 0.48rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.6rem; }
.panel-tag::before { content: ''; width: 20px; height: 1px; background: var(--gold); }
.panel-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 300; color: var(--white); line-height: 1.1; margin-bottom: 1rem; }
.panel-title em { font-style: italic; color: var(--gold-light); }
.panel-desc { font-size: 0.85rem; color: var(--ash); line-height: 1.95; max-width: 520px; }

.panel-specs { display: flex; gap: 3rem; padding: 2rem 3.5rem; border-top: 1px solid rgba(201,169,110,0.08); margin-top: 2rem; }
.panel-spec-label { font-family: 'Space Mono', monospace; font-size: 0.42rem; letter-spacing: 0.22em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 0.3rem; }
.panel-spec-value { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 300; color: var(--white); }

.panel-actions { display: flex; gap: 1rem; padding: 2rem 3.5rem; border-top: 1px solid rgba(201,169,110,0.08); align-items: center; }
.panel-cta {
  font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--obsidian); background: var(--gold);
  padding: 0.9rem 2rem; text-decoration: none; cursor: none;
  display: inline-block; transition: all 0.3s; position: relative; overflow: hidden;
}
.panel-cta::before { content: ''; position: absolute; inset: 0; background: var(--gold-light); transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.23,1,0.32,1); }
.panel-cta:hover::before { transform: translateX(0); }
.panel-cta span { position: relative; z-index: 1; }
.panel-secondary {
  font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ash); text-decoration: none;
  cursor: none; transition: color 0.3s; padding: 0.9rem 0;
  border-bottom: 1px solid transparent;
}
.panel-secondary:hover { color: var(--gold); border-color: var(--gold-dim); }
.panel-close {
  position: absolute; top: 1.4rem; right: 1.8rem;
  background: none; border: none; color: var(--ash);
  font-size: 1.2rem; cursor: none; transition: color 0.2s; line-height: 1;
}
.panel-close:hover { color: var(--white); }

@keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 640px) {
  nav { padding: 1.5rem 2rem; }
  .panel-box { width: 94vw; }
  .panel-top { padding: 2.5rem 2rem 0; }
  .panel-specs { padding: 1.5rem 2rem; gap: 1.5rem; flex-wrap: wrap; }
  .panel-actions { padding: 1.5rem 2rem; flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="grain"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="cosmos"></canvas>

<nav>
  <a href="index.html" class="nav-logo">Bhav<span>é</span>'s Lab</a>
  <a href="index.html" class="nav-back">← Back</a>
</nav>

<div id="field"></div>

<div class="hint">
  <span>Pull a tool in</span>
  <div class="hint-line"></div>
</div>

<!-- EXPANDED PANEL -->
<div id="panel">
  <div class="panel-box">
    <button class="panel-close" id="panel-close">×</button>
    <div class="panel-top">
      <p class="panel-tag" id="panel-tag"></p>
      <h2 class="panel-title" id="panel-title"></h2>
      <p class="panel-desc" id="panel-desc"></p>
    </div>
    <div class="panel-specs" id="panel-specs"></div>
    <div class="panel-actions" id="panel-actions"></div>
  </div>
</div>

<script>
// ── CURSOR ──────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let rx = mx, ry = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
});
(function loopRing() {
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(loopRing);
})();

// ── COSMOS ──────────────────────────────────────────────────
const canvas = document.getElementById('cosmos');
const ctx    = canvas.getContext('2d');
let W, H, stars = [], shooters = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = [];
  const n = Math.floor(W * H / 5000);
  for (let i = 0; i < n; i++) {
    const gold = Math.random() < 0.18;
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+0.2, b: Math.random()*0.5+0.08, p: Math.random()*Math.PI*2, ps: Math.random()*0.8+0.3, t: Math.random()*0.4+0.3, gold });
  }
}
resize();
window.addEventListener('resize', () => { resize(); placePlanets(); });

function spawnShooter() {
  const a = (Math.random()*30+15)*Math.PI/180;
  const gold = Math.random() < 0.3;
  shooters.push({ x: Math.random()*W*0.7, y: Math.random()*H*0.4, vx: Math.cos(a)*(Math.random()*6+5), vy: Math.sin(a)*(Math.random()*6+5), trail: [], gold, life: 1, decay: Math.random()*.015+.012 });
}
setInterval(() => { if (Math.random() < 0.7) spawnShooter(); }, 2400);

function drawCosmos(t) {
  ctx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    s.p += 0.007;
    const a = Math.max(0.02, Math.min(1, s.b + Math.sin(s.p) * s.t * 0.4));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.gold ? `rgba(201,169,110,${a})` : `rgba(237,232,224,${a*0.7})`;
    if (s.gold && a > 0.5 && s.r > 0.9) { ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(201,169,110,0.5)'; }
    ctx.fill(); ctx.shadowBlur = 0;
  });
  shooters = shooters.filter(s => s.life > 0);
  shooters.forEach(s => {
    s.trail.push({x:s.x, y:s.y}); if (s.trail.length > 22) s.trail.shift();
    s.x += s.vx; s.y += s.vy; s.life -= s.decay;
    if (s.trail.length < 2) return;
    const c = s.gold ? '201,169,110' : '237,232,224';
    for (let i = 1; i < s.trail.length; i++) {
      const p = i / s.trail.length;
      ctx.beginPath(); ctx.moveTo(s.trail[i-1].x, s.trail[i-1].y); ctx.lineTo(s.trail[i].x, s.trail[i].y);
      ctx.strokeStyle = `rgba(${c},${p*s.life*(s.gold?.9:.6)})`; ctx.lineWidth = p*2; ctx.lineCap = 'round'; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(s.x, s.y, s.gold?2:1.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${c},${s.life*(s.gold?1:.8)})`;
    if (s.gold) { ctx.shadowBlur = 12; ctx.shadowColor = `rgba(${c},0.8)`; }
    ctx.fill(); ctx.shadowBlur = 0;
  });
  requestAnimationFrame(ts => drawCosmos(ts/1000));
}
drawCosmos(0);
setTimeout(spawnShooter, 600); setTimeout(spawnShooter, 1800);

// ── TOOL DATA ────────────────────────────────────────────────
const TOOLS = [
  {
    id: 'study-yourself',
    label: 'Study Yourself',
    status: '● Live',
    size: 88,
    live: true,
    tag: 'Course — Self-Directed',
    title: 'Study <em>Yourself</em>',
    desc: 'Ten sections. One framework. A structured move through the full sequence — State to Reality — using your own life as the material. Self-directed. No session required.',
    specs: [
      { label: 'Format', value: 'Self-Directed' },
      { label: 'Sections', value: '10' },
      { label: 'Investment', value: '$97 one time' },
    ],
    primaryLabel: 'Get Access',
    primaryHref: null,
    primaryIsPaywall: true,
    secondaryLabel: null,
  },
  {
    id: 'consciousness-mirror',
    label: 'Consciousness Mirror',
    status: '● Free',
    size: 72,
    live: true,
    tag: 'Tool — Free',
    title: 'Consciousness <em>Mirror</em>',
    desc: 'A real-time reflection environment. Enter what is present. The system reflects your own patterns back without interpretation or instruction. No sign-in required.',
    specs: [
      { label: 'Format', value: 'Interactive' },
      { label: 'Access', value: 'Free' },
      { label: 'Sign-in', value: 'Not required' },
    ],
    primaryLabel: 'Enter',
    primaryHref: 'consciousness-mirror.html',
    primaryIsPaywall: false,
    secondaryLabel: null,
  },
  {
    id: 'pattern-immersion-tool',
    label: 'Pattern Immersion',
    status: '◌ Coming',
    size: 60,
    live: false,
    tag: 'Program — In Development',
    title: 'Pattern <em>Immersion</em>',
    desc: 'The full console as a continuous process. Coming as a structured digital environment alongside the live session program.',
    specs: [],
    primaryLabel: null,
    primaryHref: null,
    secondaryLabel: null,
  },
  {
    id: 'the-console',
    label: 'The Console',
    status: '◌ Coming',
    size: 52,
    live: false,
    tag: 'Ongoing — In Development',
    title: 'The <em>Console</em>',
    desc: 'The paid digital layer. State tracking over time. Pattern history. Recurring script detection. Built when it can be built to be worth every moment inside it.',
    specs: [],
    primaryLabel: null,
    primaryHref: null,
    secondaryLabel: null,
  },
];

// ── PLANET PLACEMENT ─────────────────────────────────────────
const field = document.getElementById('field');
let planets = [];

function getOrbitPositions() {
  const cx = W * 0.5;
  const cy = H * 0.5;
  return [
    { x: cx - W * 0.22, y: cy - H * 0.12 },
    { x: cx + W * 0.20, y: cy + H * 0.10 },
    { x: cx + W * 0.18, y: cy - H * 0.18 },
    { x: cx - W * 0.16, y: cy + H * 0.18 },
  ];
}

function createPlanets() {
  field.innerHTML = '';
  planets = [];
  const positions = getOrbitPositions();

  TOOLS.forEach((tool, i) => {
    const pos = positions[i];
    const el = document.createElement('div');
    el.className = 'planet' + (tool.live ? '' : ' dim');
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    el.dataset.id = tool.id;

    const size = tool.size;
    const ringSize = size + 28;

    el.innerHTML = `
      <div class="planet-core" style="width:${size}px;height:${size}px;border:1px solid rgba(201,169,110,${tool.live?.35:.12});background:rgba(201,169,110,${tool.live?.06:.02});box-shadow:${tool.live?'0 0 30px rgba(201,169,110,0.12)':'none'};">
        <div class="planet-ring" style="width:${ringSize}px;height:${ringSize}px;animation-duration:${18+i*5}s;"></div>
        <div class="planet-dot" style="opacity:${tool.live?1:.4};"></div>
      </div>
      <p class="planet-status">${tool.status}</p>
      <p class="planet-label">${tool.label}</p>
    `;

    if (tool.live) {
      el.addEventListener('click', () => openPanel(tool));
      el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
    }

    field.appendChild(el);
    planets.push({ el, baseX: pos.x, baseY: pos.y, phase: Math.random() * Math.PI * 2, speed: 0.0004 + i * 0.00008, amp: 10 + i * 4 });
  });
}

function placePlanets() {
  const positions = getOrbitPositions();
  planets.forEach((p, i) => {
    p.baseX = positions[i].x;
    p.baseY = positions[i].y;
  });
}

// ── AMBIENT DRIFT ────────────────────────────────────────────
let lastT = 0;
function driftPlanets(t) {
  planets.forEach(p => {
    p.phase += p.speed * (t - lastT);
    const dx = Math.sin(p.phase) * p.amp;
    const dy = Math.cos(p.phase * 0.7) * (p.amp * 0.6);
    p.el.style.left = (p.baseX + dx) + 'px';
    p.el.style.top  = (p.baseY + dy) + 'px';
  });
  lastT = t;
  requestAnimationFrame(driftPlanets);
}

createPlanets();
requestAnimationFrame(t => { lastT = t; driftPlanets(t); });

// ── PANEL ────────────────────────────────────────────────────
const panel        = document.getElementById('panel');
const panelClose   = document.getElementById('panel-close');
const panelTag     = document.getElementById('panel-tag');
const panelTitle   = document.getElementById('panel-title');
const panelDesc    = document.getElementById('panel-desc');
const panelSpecs   = document.getElementById('panel-specs');
const panelActions = document.getElementById('panel-actions');

const STRIPE_LINK = 'https://buy.stripe.com/28E28k7wo49A7Vc9NhbQY03';

function openPanel(tool) {
  panelTag.textContent  = tool.tag;
  panelTitle.innerHTML  = tool.title;
  panelDesc.textContent = tool.desc;

  if (tool.specs.length > 0) {
    panelSpecs.style.display = 'flex';
    panelSpecs.innerHTML = tool.specs.map(s => `
      <div>
        <p class="panel-spec-label">${s.label}</p>
        <p class="panel-spec-value">${s.value}</p>
      </div>
    `).join('');
  } else {
    panelSpecs.style.display = 'none';
  }

  panelActions.innerHTML = '';
  if (tool.primaryLabel) {
    if (tool.primaryIsPaywall) {
      panelActions.innerHTML = `
        <a href="${STRIPE_LINK}" class="panel-cta"><span>${tool.primaryLabel}</span></a>
        <span style="font-family:'Space Mono',monospace;font-size:0.45rem;letter-spacing:.15em;color:var(--ash);">No subscription. Access does not expire.</span>
      `;
    } else {
      panelActions.innerHTML = `<a href="${tool.primaryHref}" class="panel-cta"><span>${tool.primaryLabel}</span></a>`;
    }
  } else {
    panelActions.innerHTML = `
      <p style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--ash);">In development. This environment is being built to be worth every moment inside it.</p>
    `;
  }

  panelActions.querySelectorAll('a').forEach(a => {
    a.addEventListener('mouseenter', () => ring.classList.add('hovering'));
    a.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
  });

  panel.classList.add('open');
}

function closePanel() { panel.classList.remove('open'); }
panelClose.addEventListener('click', closePanel);
panel.addEventListener('click', e => { if (e.target === panel) closePanel(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
panelClose.addEventListener('mouseenter', () => ring.classList.add('hovering'));
panelClose.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
</script>

</body>
</html>
