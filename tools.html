:root {
  --void:    #080808;

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--void); overflow:hidden; font-family:var(--mono); }

/* ── NAV ──────────────────────────────────────────────────── */
.bl-nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 22px;

  font-family:var(--serif); font-weight:300; font-size:12px;

.bl-hamburger {
  background:none; border:none; cursor:pointer;
  padding:4px; display:flex; flex-direction:column; gap:5px; z-index:201;
}
.bl-hamburger span {
  display:block; width:20px; height:1px;
  background:rgba(201,168,76,0.5); transition:all 0.3s ease; transform-origin:center;
}
.bl-hamburger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg); background:rgba(201,168,76,0.9); }
.bl-hamburger.open span:nth-child(2) { opacity:0; }

.bl-menu {

  padding:80px 32px 48px;

}
.bl-menu.open { opacity:1; pointer-events:all; }
.bl-nav-section { margin-bottom:24px; opacity:0; transform:translateY(8px); transition:opacity 0.3s,transform 0.3s; }
.bl-menu.open .bl-nav-section:nth-child(1){opacity:1;transform:translateY(0);transition-delay:0.05s;}
.bl-menu.open .bl-nav-section:nth-child(2){opacity:1;transform:translateY(0);transition-delay:0.1s;}

/* ── PLANET PANEL ─────────────────────────────────────────── */

.panel-cta:hover { border-color:rgba(201,168,76,0.7); color:var(--gold); background:rgba(201,168,76,0.04); }

.panel-price {

<script>
const INNER_PLANETS = [
  { id:'mirror', name:'The Mirror', orbit:'INNER · TOOL', desc:'A real-time State check. Eight questions. The Mirror surfaces the pattern underneath your current state — not what you think is happening, but what the system is actually doing.', cta:'Enter the Mirror', href:'mirror-landing.html', price:'$1', color:[78,205,196], angle:-Math.PI/2, live:true },
  { id:'study', name:'Study Yourself', orbit:'INNER · COURSE', desc:'Sixty questions across ten sections. The system reads your responses for structural pattern — not what you say, but how you\'re organized. Your Pattern Map is generated at completion.', cta:'Begin', href:'study-yourself-landing.html', price:'$25', color:[160,207,108], angle:0, live:true },
  { id:'thread', name:'The Thread', orbit:'INNER · INSTRUMENT', desc:'Variable accumulation over time. You bring what happened, what shifted, what connection your system made. The Thread traces what moves through you across changing conditions.', cta:'Enter The Thread', href:'thread-landing.html', price:'$5 / mo', color:[201,168,76], angle:Math.PI/2, live:true },
  { id:'pattern', name:'Pattern Immersion', orbit:'INNER · SESSION', desc:'Deep immersion work. Bhavé present. The full session — biofeedback baseline, framework application, hypnosis, post-read. Nothing left out.', cta:'Book a Session', href:'pattern-immersion-landing.html', price:'$2,400', color:[228,210,130], angle:Math.PI, live:true }
];

const OUTER_PLANETS = [
  { id:'study-session', name:'Study Session', orbit:'OUTER · SESSION', desc:'One session. Structured awareness work. You bring a situation — the session moves through it with precision. A calibrated entry point into the deeper work.', cta:'Book', href:'study-session-landing.html', price:'$225', color:[92,208,175], angle:-Math.PI/4, live:true },
  { id:'inner-mining', name:'Inner Mining', orbit:'OUTER · SESSION', desc:'Deep dive into the operating pattern. A full session dedicated to excavation — what runs beneath the surface decisions, the recurring outcomes, the persistent loops.', cta:'Book', href:'inner-mining-landing.html', price:'$500', color:[118,210,148], angle:Math.PI/4, live:true },
  { id:'gospel', name:'Gospel Immersion', orbit:'OUTER · EXPERIENCE', desc:'The full session in a sovereign container. Tulum. Your space or a secured environment. Nothing scheduled around it — the work runs as long as the work requires.', cta:'Learn More', href:'gospel-immersion.html', price:'$750 — $500', color:[193,188,85], angle:Math.PI+Math.PI/4, live:true },
  { id:'workshops', name:'Workshops', orbit:'OUTER · GROUP', desc:'Group sessions. The framework applied in a collective field. Dates and formats announced as they form.', cta:'View Workshops', href:'workshops-landing.html', price:'Variable', color:[88,212,200], angle:Math.PI-Math.PI/4, live:true }
];

// SOURCE pulse globals
let pulses = [];
let _innerR = 0;
function triggerSourcePulse() {
  let sR = _innerR * 0.22, mR = sR + _innerR * 0.6;
  pulses.push({ r:sR, startR:sR, maxR:mR });
  setTimeout(()=>pulses.push({ r:sR, startR:sR, maxR:mR }), 180);
  setTimeout(()=>pulses.push({ r:sR, startR:sR, maxR:mR }), 360);
}

new p5(function(p) {
  let W, H, cx, cy, innerR, outerR;
  let bgParticles = [], shootingStars = [], twinkleStars = [];
  let hoveredPlanet = null, t = 0;

  // ── SOURCE-EMISSION PARTICLE ─────────────────────────────────────────
  // Births at center, radiates outward with Perlin-noise curling,
  // arcs back inward during final third of life. Color: teal (center) → gold (edge).
  class BgParticle {
    constructor(scattered) {
      this.sz    = p.random(0.3, 1.6);
      this.trail = [];
      if (scattered) this.resetScattered(); else this.resetCenter();
    }

    resetCenter() {
      const ang    = p.random(p.TWO_PI);
      const burst  = p.random(0.5, 2.0);
      this.x       = cx + p.random(-10, 10);
      this.y       = cy + p.random(-10, 10);
      this.vx      = Math.cos(ang) * burst;
      this.vy      = Math.sin(ang) * burst;
      this.maxAge  = p.random(260, 700);
      this.age     = 0;
      this.trail   = [];
    }

    resetScattered() {
      // Seed the field across the canvas on first load so it looks alive immediately
      const ang    = p.random(p.TWO_PI);
      const r      = p.random(0, outerR * 1.2);
      this.x       = cx + Math.cos(ang) * r;
      this.y       = cy + Math.sin(ang) * r;
      const va     = p.random(p.TWO_PI);
      this.vx      = Math.cos(va) * p.random(0.2, 1.4);
      this.vy      = Math.sin(va) * p.random(0.2, 1.4);
      this.maxAge  = p.random(260, 700);
      this.age     = p.random(0, this.maxAge);
      this.trail   = [];
    }

    update() {
      const dx    = cx - this.x;
      const dy    = cy - this.y;
      const dist  = Math.sqrt(dx*dx + dy*dy);
      const maxR  = outerR * 1.3;
      const lifeT = this.age / this.maxAge;

      // Perlin noise — creates organic curling, not straight lines
      const nAng = p.noise(this.x * 0.0038, this.y * 0.0038, p.frameCount * 0.002) * Math.PI * 2.5;
      this.vx += Math.cos(nAng) * 0.014;
      this.vy += Math.sin(nAng) * 0.014;

      // Phase 1 (0–40% of life): outward burst from SOURCE
      if (lifeT < 0.40 && dist > 0) {
        const outStr = 0.092 * (1.0 - lifeT / 0.40);
        this.vx -= (dx / dist) * outStr;
        this.vy -= (dy / dist) * outStr;
      }

      // Phase 3 (62–100% of life): arc back toward SOURCE
      if (lifeT > 0.62 && dist > 0) {
        const retStr = 0.11 * ((lifeT - 0.62) / 0.38);
        this.vx += (dx / dist) * retStr;
        this.vy += (dy / dist) * retStr;
      }

      // Constant gentle gravity toward center (scales with distance)
      if (dist > 0) {
        const g = 0.010 * Math.min(dist / maxR, 1.0);
        this.vx += (dx / dist) * g;
        this.vy += (dy / dist) * g;
      }

      const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      if (spd > 2.2) { this.vx = (this.vx/spd)*2.2; this.vy = (this.vy/spd)*2.2; }
      this.vx *= 0.92; this.vy *= 0.92;
      this.x  += this.vx;
      this.y  += this.vy;

      this.trail.push({ x:this.x, y:this.y, d:dist });
      if (this.trail.length > 24) this.trail.shift();
      this.age++;

      // Respawn at center when returned or expired
      const returnedHome = dist < 14 && lifeT > 0.50;
      if (this.age > this.maxAge || returnedHome || dist > maxR * 1.1) this.resetCenter();
    }

    draw() {
      const lifeAlpha = 1 - this.age / this.maxAge;
      const maxR      = outerR * 1.3;
      const colorRange = maxR * 0.58;

      // Trail — color shifts teal→gold with distance from center
      for (let i = 1; i < this.trail.length; i++) {
        const t2     = i / this.trail.length;
        const cT     = Math.min(this.trail[i].d / colorRange, 1.0);
        // teal [78,205,196] → gold [225,208,125]
        const r = (78  + (225 - 78)  * cT) | 0;
        const g = (205 + (208 - 205) * cT) | 0;
        const b = (196 + (125 - 196) * cT) | 0;
        p.stroke(r, g, b, t2 * 98 * lifeAlpha);
        p.strokeWeight(this.sz * t2 * 1.1);
        p.line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
      }

      // Head dot
      const dist = Math.sqrt(Math.pow(this.x - cx, 2) + Math.pow(this.y - cy, 2));
      const cT   = Math.min(dist / colorRange, 1.0);
      const r    = (78  + (225 - 78)  * cT) | 0;
      const g    = (205 + (208 - 205) * cT) | 0;
      const b    = (196 + (125 - 196) * cT) | 0;
      p.fill(r, g, b, 157 * lifeAlpha);
      p.noStroke();
      p.ellipse(this.x, this.y, this.sz * 2.4, this.sz * 2.4);
    }
  }

  p.setup = function() {
    W = window.innerWidth; H = window.innerHeight;
    let cv = p.createCanvas(W, H); cv.parent('cv-container');
    p.colorMode(p.RGB, 255, 255, 255, 255); p.smooth();
    p.noiseSeed(42);
    cx = W/2; cy = H/2 + H*0.05;
    let m = Math.min(W, H); innerR = m*0.38; outerR = m*0.58;
    _innerR = innerR;
    for (let i = 0; i < 950; i++) bgParticles.push(new BgParticle(true));
    for (let i = 0; i < 180; i++) twinkleStars.push({ x:p.random(W), y:p.random(H), sz:p.random(0.6,3.2), phase:p.random(p.TWO_PI), spd:p.random(0.5,2.8), base:p.random(40,229) });
  };

  p.windowResized = function() {
    W = window.innerWidth; H = window.innerHeight;
    p.resizeCanvas(W, H); cx=W/2; cy=H/2+H*0.05;
    let m = Math.min(W, H); innerR=m*0.33; outerR=m*0.58;
    _innerR = innerR;
    for (let pt of bgParticles) pt.resetScattered();
  };

  p.draw = function() {
    // Void fade — long trails, same depth as index.html
    p.fill(8, 8, 8, 16); p.noStroke(); p.rect(0, 0, W, H);
    t += 0.006;

    // Flow particles — emanate from SOURCE, arc back in
    for (let pt of bgParticles) { pt.update(); pt.draw(); }

    // Twinkle stars (depth layer)
    for (let s of twinkleStars) {
      const a = (p.sin(t * s.spd + s.phase) * 0.5 + 0.5) * s.base;
      p.noStroke(); p.fill(201, 168, 76, a); p.ellipse(s.x, s.y, s.sz, s.sz);
    }

    // Shooting stars
    if (p.random() < 0.010) {
      const ang = p.random(p.TWO_PI), spd = p.random(8, 20);
      shootingStars.push({ x:cx+p.random(-W*0.48,W*0.48), y:cy+p.random(-H*0.48,H*0.48), vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:0, maxLife:Math.floor(p.random(22,52)), len:p.random(45,130) });
    }
    for (let i = shootingStars.length-1; i >= 0; i--) {
      const s  = shootingStars[i];
      const al = (1 - s.life/s.maxLife) * 145;
      const tl = s.len * (s.life/s.maxLife);
      const dv = Math.max(s.vx*s.vx + s.vy*s.vy, 1);
      p.stroke(228, 210, 130, al); p.strokeWeight(0.7);
      p.line(s.x, s.y, s.x - s.vx*(tl/dv)*0.5, s.y - s.vy*(tl/dv)*0.5);
      s.x += s.vx; s.y += s.vy; s.life++;
      if (s.life >= s.maxLife) shootingStars.splice(i, 1);
    }

    // Orbit rings (dimmed — background field shows through)
    p.noFill(); p.stroke(201,168,76,6); p.strokeWeight(0.5); p.ellipse(cx,cy,innerR*2,innerR*2);
    p.stroke(78,205,196,4); p.ellipse(cx,cy,outerR*2,outerR*2);

    // SOURCE — lunar glass sphere with cool white-silver-blue palette
    {
      const sCtx = p.drawingContext;
      const SR   = 26;
      const r1a  = innerR*0.22 + 44 + p.sin(t*0.7)*10;
      const r1b  = innerR*0.22 + 26 + p.sin(t*1.2)*6;
      const r1c  = innerR*0.22 + 10;

      // Atmospheric breath — slow expansion from SOURCE to full viewport and back (~10s cycle)
      // t increments 0.006/frame at 60fps → 0.36/sec; k=1.745 gives 2π/3.6 ≈ 10s period
      const atmBreath = (p.sin(t * 1.745) + 1) * 0.5; // 0..1
      const viewDiag  = Math.sqrt(W*W + H*H);
      const breathR   = SR*2.5 + (viewDiag - SR*2.5) * atmBreath;
      const aA0 = (0.22 - atmBreath * 0.18).toFixed(3); // 0.22 tight → 0.04 full
      const aA1 = (0.08 - atmBreath * 0.065).toFixed(3);
      const atmoGrad = sCtx.createRadialGradient(cx, cy, SR, cx, cy, breathR);
      atmoGrad.addColorStop(0,    `rgba(215,232,255,${aA0})`);
      atmoGrad.addColorStop(0.35, `rgba(195,218,252,${aA1})`);
      atmoGrad.addColorStop(1,    'rgba(185,210,248,0)');
      sCtx.fillStyle = atmoGrad;
      sCtx.beginPath(); sCtx.arc(cx, cy, breathR, 0, Math.PI*2); sCtx.fill();

      // Energy field arms — cool pale blue
      for (let arm = 0; arm < 4; arm++) {
        const baseAng = (arm / 4) * Math.PI*2 + t*0.06;
        for (let u = 0.08; u < 0.90; u += 0.035) {
          const sAng = baseAng + u * Math.PI * 2.2;
          const sRad = u * SR * 5.5;
          const sx   = cx + Math.cos(sAng) * sRad;
          const sy   = cy + Math.sin(sAng) * sRad;
          sCtx.fillStyle = `rgba(210,228,255,${(1-u)*0.12})`;
          sCtx.beginPath();
          sCtx.arc(sx, sy, (1-u)*2.0+0.3, 0, Math.PI*2);
          sCtx.fill();
        }
      }

      // Corona rings — cool white and pale blue
      sCtx.lineWidth = 0.5;
      sCtx.strokeStyle = 'rgba(200,220,255,0.05)';
      sCtx.beginPath(); sCtx.arc(cx, cy, r1a, 0, Math.PI*2); sCtx.stroke();
      sCtx.strokeStyle = 'rgba(200,220,255,0.13)';
      sCtx.beginPath(); sCtx.arc(cx, cy, r1b, 0, Math.PI*2); sCtx.stroke();
      sCtx.strokeStyle = 'rgba(220,235,255,0.30)';
      sCtx.beginPath(); sCtx.arc(cx, cy, r1c, 0, Math.PI*2); sCtx.stroke();

      // Semi-transparent glass base — cool silver-white
      sCtx.fillStyle = 'rgba(220,235,255,0.22)';
      sCtx.beginPath(); sCtx.arc(cx, cy, SR, 0, Math.PI*2); sCtx.fill();

      // Inner glow — pure white core fading to pale blue-silver
      const innerG = sCtx.createRadialGradient(cx, cy, 0, cx, cy, SR);
      innerG.addColorStop(0,    'rgba(255,255,255,1.0)');
      innerG.addColorStop(0.18, 'rgba(240,248,255,0.94)');
      innerG.addColorStop(0.45, 'rgba(210,228,252,0.55)');
      innerG.addColorStop(0.80, 'rgba(185,210,245,0.20)');
      innerG.addColorStop(1,    'rgba(185,210,245,0)');
      sCtx.fillStyle = innerG;
      sCtx.beginPath(); sCtx.arc(cx, cy, SR, 0, Math.PI*2); sCtx.fill();

      // Lunar surface texture — subtle dark patches clipped to sphere
      sCtx.save();
      sCtx.beginPath(); sCtx.arc(cx, cy, SR, 0, Math.PI*2); sCtx.clip();
      sCtx.globalAlpha = 0.10;
      sCtx.fillStyle = 'rgba(80,100,130,1)';
      sCtx.beginPath();
      sCtx.ellipse(cx+SR*0.18, cy+SR*0.20, SR*0.30, SR*0.18, 0.5, 0, Math.PI*2);
      sCtx.fill();
      sCtx.beginPath();
      sCtx.ellipse(cx-SR*0.22, cy+SR*0.05, SR*0.20, SR*0.13, -0.3, 0, Math.PI*2);
      sCtx.fill();
      sCtx.beginPath();
      sCtx.ellipse(cx+SR*0.05, cy-SR*0.25, SR*0.14, SR*0.09, 0.8, 0, Math.PI*2);
      sCtx.fill();
      sCtx.restore();

      // Glass rim — thin white arc upper-left (9→12 o'clock)
      sCtx.beginPath();
      sCtx.arc(cx, cy, SR * 0.88, Math.PI, Math.PI * 1.5);
      sCtx.lineWidth = Math.max(1.5, SR * 0.07);
      sCtx.strokeStyle = 'rgba(255,255,255,0.88)';
      sCtx.stroke();

      // Specular dot — bright pinpoint upper-left
      const spx = cx - SR*0.38, spy = cy - SR*0.38;
      const spec = sCtx.createRadialGradient(spx, spy, 0, spx, spy, SR*0.30);
      spec.addColorStop(0, 'rgba(255,255,255,1.0)');
      spec.addColorStop(1, 'rgba(255,255,255,0)');
      sCtx.fillStyle = spec;
      sCtx.beginPath(); sCtx.arc(spx, spy, SR*0.30, 0, Math.PI*2); sCtx.fill();
    }
    p.noStroke();

    // SOURCE pulse rings (on tap)
    for (let i = pulses.length-1; i >= 0; i--) {
      const pu   = pulses[i];
      const prog = (pu.r - pu.startR) / (pu.maxR - pu.startR);
      p.noFill(); p.stroke(200,220,255,(1-prog)*70); p.strokeWeight(1);
      p.ellipse(cx, cy, pu.r*2, pu.r*2);
      pu.r += pu.maxR * 0.022;
      if (pu.r >= pu.maxR) pulses.splice(i, 1);
    }

    // Planets — always on top
    drawPlanets(INNER_PLANETS, innerR, 0.28, 22);
    drawPlanets(OUTER_PLANETS, outerR, -0.16, 22);
  };

  function drawPlanets(planets, radius, driftSpeed, planetR) {
    for (let i = 0; i < planets.length; i++) {
      const pl  = planets[i];
      const ang = pl.angle + t * driftSpeed;
      const px  = cx + radius * Math.cos(ang);
      const py  = cy + radius * Math.sin(ang);
      const isH = hoveredPlanet === pl.id;

      // Per-planet breathing — unique rhythm from angle-derived phase
      const breathSpd = 0.28 + Math.abs(Math.sin(pl.angle * 2.7)) * 0.28;
      const breathT   = p.sin(t * breathSpd + pl.angle) * 0.5 + 0.5;

      const r     = planetR + (isH ? 4 : 0) + breathT * 1.5;
      pl._px = px; pl._py = py; pl._r = planetR + 14;
      const col   = pl.color;
      const base  = pl.live ? 1.0 : 0.35;
      const alpha = base * (0.80 + breathT * 0.20);

      // Color variants: lit face and bright core
      const lr  = Math.min(255, col[0] * 1.5 + 60) | 0;
      const lg  = Math.min(255, col[1] * 1.5 + 60) | 0;
      const lb  = Math.min(255, col[2] * 1.5 + 60) | 0;
      const lr2 = Math.min(255, col[0] * 2.0 + 100) | 0;
      const lg2 = Math.min(255, col[1] * 2.0 + 100) | 0;
      const lb2 = Math.min(255, col[2] * 2.0 + 100) | 0;

      const ctx = p.drawingContext;
      ctx.save();
      ctx.globalAlpha = alpha;

      // Outer corona (breathing)
      const glowR = r * (2.6 + breathT * 0.7) + (isH ? 12 : 0);
      const corona = ctx.createRadialGradient(px, py, r*0.6, px, py, glowR);
      corona.addColorStop(0,   `rgba(${col[0]},${col[1]},${col[2]},0.22)`);
      corona.addColorStop(0.5, `rgba(${col[0]},${col[1]},${col[2]},0.08)`);
      corona.addColorStop(1,   `rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle = corona;
      ctx.beginPath(); ctx.arc(px, py, glowR, 0, Math.PI*2); ctx.fill();

      // Semi-transparent glass base (15–20% opacity — field visible through planet)
      ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.18)`;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();

      // Inner light core — bright center radiating outward through glass body
      const innerGlow = ctx.createRadialGradient(px, py, 0, px, py, r);
      innerGlow.addColorStop(0,    `rgba(${lr2},${lg2},${lb2},0.92)`);
      innerGlow.addColorStop(0.22, `rgba(${lr},${lg},${lb},0.60)`);
      innerGlow.addColorStop(0.55, `rgba(${col[0]},${col[1]},${col[2]},0.22)`);
      innerGlow.addColorStop(1,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle = innerGlow;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();

      // Glass rim highlight — thin bright arc upper-left (9→12 o'clock, clockwise)
      ctx.globalAlpha = alpha * 0.78;
      ctx.beginPath();
      ctx.arc(px, py, r * 0.88, Math.PI, Math.PI * 1.5);
      ctx.lineWidth = Math.max(1, r * 0.07);
      ctx.strokeStyle = 'rgba(255,255,255,0.82)';
      ctx.stroke();

      // Specular dot — tiny bright point upper-left
      ctx.globalAlpha = alpha * 0.88;
      const spx = px - r*0.40, spy = py - r*0.40;
      const spec = ctx.createRadialGradient(spx, spy, 0, spx, spy, r*0.24);
      spec.addColorStop(0, 'rgba(255,255,255,0.95)');
      spec.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = spec;
      ctx.beginPath(); ctx.arc(spx, spy, r*0.24, 0, Math.PI*2); ctx.fill();

      ctx.restore();
    }
  }

  p.mouseMoved = function() {
    hoveredPlanet = null;
    if (Math.sqrt(Math.pow(p.mouseX-cx,2)+Math.pow(p.mouseY-cy,2)) < innerR*0.22+44) { document.body.style.cursor='pointer'; return; }
    for (const pl of [...INNER_PLANETS,...OUTER_PLANETS]) {
      if (!pl._px) continue;
      if (Math.sqrt(Math.pow(p.mouseX-pl._px,2)+Math.pow(p.mouseY-pl._py,2)) < pl._r+16) { hoveredPlanet=pl.id; document.body.style.cursor='pointer'; return; }
    }
    document.body.style.cursor = 'default';
  };

  p.mousePressed = function() {
    if (Math.sqrt(Math.pow(p.mouseX-cx,2)+Math.pow(p.mouseY-cy,2)) < innerR*0.22+44) { triggerSourcePulse(); openSourcePanel(); return false; }
    for (const pl of [...INNER_PLANETS,...OUTER_PLANETS]) {
      if (!pl._px) continue;
      if (Math.sqrt(Math.pow(p.mouseX-pl._px,2)+Math.pow(p.mouseY-pl._py,2)) < pl._r+18) { openPanel(pl); return false; }
    }
  };

  p.touchStarted = function() {
    if (document.getElementById('planet-panel').classList.contains('open')) return;
    const tx = p.touches.length > 0 ? p.touches[0].x : p.mouseX;
    const ty = p.touches.length > 0 ? p.touches[0].y : p.mouseY;
    if (Math.sqrt(Math.pow(tx-cx,2)+Math.pow(ty-cy,2)) < innerR*0.22+44) { triggerSourcePulse(); openSourcePanel(); return false; }
    for (const pl of [...INNER_PLANETS,...OUTER_PLANETS]) {
      if (!pl._px) continue;
      if (Math.sqrt(Math.pow(tx-pl._px,2)+Math.pow(ty-pl._py,2)) < pl._r+22) { openPanel(pl); return false; }
    }
  };

}, document.getElementById('cv-container'));

function openSourcePanel() {
  document.getElementById('panel-orbit').textContent   = '';
  document.getElementById('panel-name').textContent    = 'SOURCE';
  document.getElementById('panel-desc').textContent    = 'I Am';
  document.getElementById('panel-actions').innerHTML   = '';
  document.getElementById('planet-panel').classList.add('open');
}
function openPanel(pl) {
  document.getElementById('panel-orbit').textContent = pl.orbit;
  document.getElementById('panel-name').textContent  = pl.name;
  document.getElementById('panel-desc').textContent  = pl.coming || pl.desc;
  document.getElementById('panel-actions').innerHTML = pl.coming
    ? `<span style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.18em;color:rgba(201,168,76,0.25);text-transform:uppercase;">${pl.coming}</span>`
    : `<a class="panel-cta" href="${pl.href}">${pl.cta}</a><span class="panel-price">${pl.price}</span>`;
  document.getElementById('planet-panel').classList.add('open');
}
function closePanel() { document.getElementById('planet-panel').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') { closePanel(); closeMenu(); } });
function toggleMenu() {
  document.getElementById('bl-menu').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
  document.body.style.overflow = document.getElementById('bl-menu').classList.contains('open') ? 'hidden' : '';
}
function closeMenu() {
  document.getElementById('bl-menu').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
