<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhavé's Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080808;
  color: #c9a84c;
  font-family: 'Courier Prime', 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
}

.wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(22px, 5vw, 30px);
  letter-spacing: 0.12em;
  color: rgba(201, 168, 76, 0.85);
  margin-bottom: 8px;
  text-align: center;
}

.tagline {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: rgba(201, 168, 76, 0.3);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 52px;
}

.divider {
  width: 1px;
  height: 32px;
  background: linear-gradient(to bottom, rgba(201,168,76,0), rgba(201,168,76,0.2), rgba(201,168,76,0));
  margin: 0 auto 48px;
}

.links {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.link-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.link-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(17px, 4vw, 21px);
  color: rgba(201, 168, 76, 0.8);
  letter-spacing: 0.04em;
  text-align: center;
}

.link-desc {
  font-size: 8px;
  letter-spacing: 0.25em;
  color: rgba(201, 168, 76, 0.3);
  text-transform: uppercase;
  text-align: center;
}

.link-btn {
  display: inline-block;
  width: 100%;
  border: 1px solid rgba(201, 168, 76, 0.25);
  color: rgba(201, 168, 76, 0.75);
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-decoration: none;
  text-align: center;
  padding: 13px 24px;
  transition: all 0.2s;
}

.link-btn:hover {
  border-color: rgba(201, 168, 76, 0.6);
  color: #c9a84c;
  background: rgba(201, 168, 76, 0.04);
}

.item-sep {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, rgba(201,168,76,0), rgba(201,168,76,0.1), rgba(201,168,76,0));
  margin: 4px 0;
}
</style>
</head>
<body>

<div class="wordmark">Bhavé's Lab</div>
<div class="tagline">Links</div>
<div class="divider"></div>

<div class="links">

  <div class="link-item">
    <div class="link-name">The Gospel: Lost Chapters</div>
    <div class="link-desc">Physical text · $24.99</div>
    <a class="link-btn" href="https://buy.stripe.com/cNicMY3g86hI1wO3oTbQY04">Order Now</a>
  </div>

  <div class="item-sep"></div>

  <div class="link-item">
    <div class="link-name">Break The Illusion</div>
    <div class="link-desc">Available on Amazon · $22.95</div>
    <a class="link-btn" href="https://a.co/d/03JfKr0V">Get It</a>
  </div>

  <div class="item-sep"></div>

  <div class="link-item">
    <div class="link-name">Consciousness Mirror</div>
    <div class="link-desc">Enter · $1</div>
    <a class="link-btn" href="https://www.bhaveslab.com/mirror-landing.html">Enter</a>
  </div>

  <div class="item-sep"></div>

  <div class="link-item">
    <div class="link-name">Study Yourself</div>
    <div class="link-desc">55-question course · $25</div>
    <a class="link-btn" href="https://www.bhaveslab.com/study-yourself-landing.html">Begin</a>
  </div>

  <div class="item-sep"></div>

  <div class="link-item">
    <div class="link-name">Book a Session</div>
    <div class="link-desc">1:1 work</div>
    <a class="link-btn" href="https://calendly.com/bhaveslab">Book</a>
  </div>

  <div class="item-sep"></div>

  <div class="link-item">
    <div class="link-name">Enter the Realm</div>
    <div class="link-desc">bhaveslab.com</div>
    <a class="link-btn" href="https://www.bhaveslab.com">Enter</a>
  </div>

</div>

</body>
</html>
