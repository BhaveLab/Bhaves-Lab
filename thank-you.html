<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recorded — Bhavé's Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #080808;
  color: #c9a84c;
  font-family: 'Courier Prime', monospace;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 32px;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 480px;
}

.signal {
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  color: rgba(201, 168, 76, 0.5);
  text-transform: uppercase;
  margin-bottom: 40px;
}

.divider {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, rgba(201,168,76,0), rgba(201,168,76,0.25), rgba(201,168,76,0));
  margin: 0 auto 40px;
}

.body {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(16px, 3.5vw, 21px);
  line-height: 1.75;
  color: rgba(201, 168, 76, 0.6);
  letter-spacing: 0.02em;
  margin-bottom: 52px;
}

.cta {
  display: inline-block;
  border: 1px solid rgba(201, 168, 76, 0.35);
  color: rgba(201, 168, 76, 0.8);
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 14px 36px;
  transition: all 0.2s;
}
.cta:hover {
  border-color: rgba(201, 168, 76, 0.7);
  color: #c9a84c;
  background: rgba(201, 168, 76, 0.04);
}
</style>
</head>
<body>
<div class="container">
  <div class="signal">[ Recorded ]</div>
  <div class="divider"></div>
  <div class="body">
    Your order is confirmed.<br>
    You'll receive an email with delivery details shortly.
  </div>
  <a class="cta" href="https://www.bhaveslab.com">← Return to the Lab</a>
</div>
</body>
</html>
