<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chamber — Bhavé's Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #050505;
    --void-mid: #0d0d0d;
    --void-surface: #141414;
    --void-border: #1e1e1e;
    --gold: #b8922a;
    --gold-light: #c8a96e;
    --teal: #3dd6c8;
    --teal-dim: #1a6b65;
    --text-primary: #e8e8e8;
    --text-dim: #6b6b6b;
    --text-mid: #999;
  }

  html, body {
    height: 100%;
    background: var(--void);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    overflow: hidden;
  }

  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--void-border);
    background: var(--void);
    z-index: 10;
  }

  .header-brand {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-decoration: none;
  }

  .header-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .chamber {
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 100px);
    margin-top: 60px;
  }

  .messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: none;
  }
  .messages::-webkit-scrollbar { display: none; }

  /* No animation — messages appear immediately */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .msg.chamber > .msg-label { color: var(--teal-dim); }
  .msg.user > .msg-label { color: var(--gold); align-self: flex-end; }

  .msg-body {
    padding: 16px 20px;
    border: 1px solid var(--void-border);
    background: var(--void-surface);
    border-radius: 2px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
  }

  .msg.chamber > .msg-body {
    border-left: 2px solid var(--teal-dim);
    background: var(--void-mid);
  }

  .msg.user > .msg-body {
    border-right: 2px solid var(--gold);
    border-left: 1px solid var(--void-border);
    text-align: right;
  }

  .msg.system > .msg-body {
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    letter-spacing: 0.05em;
    padding: 4px 0;
  }

  .progress-bar {
    height: 1px;
    background: var(--void-border);
    flex-shrink: 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-dim), var(--teal));
    transition: width 0.6s ease;
    width: 0%;
  }

  .input-area {
    border-top: 1px solid var(--void-border);
    padding-top: 16px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  textarea {
    width: 100%;
    background: var(--void-surface);
    border: 1px solid var(--void-border);
    border-left: 2px solid var(--gold);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    padding: 12px 16px;
    resize: none;
    outline: none;
    border-radius: 2px;
    min-height: 68px;
    max-height: 140px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-left-color: var(--gold-light); }
  textarea::placeholder { color: var(--text-dim); font-style: italic; }

  .input-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .q-counter {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  button {
    background: transparent;
    border: 1px solid var(--teal-dim);
    color: var(--teal);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  button:hover:not(:disabled) { background: var(--teal); color: var(--void); }
  button:disabled { opacity: 0.3; cursor: default; }

  /* Report styles */
  .report-section { margin-bottom: 16px; }

  .report-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--teal);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .report-text {
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .report-divider {
    height: 1px;
    background: var(--void-border);
    margin: 16px 0;
  }

  .closing-quote {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    line-height: 1.8;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--void-border);
    white-space: pre-wrap;
  }

  /* Lead capture */
  .lead-cta {
    margin-top: 8px;
    padding: 20px;
    border: 1px solid var(--gold);
    background: rgba(184, 146, 42, 0.04);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lead-cta-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .lead-cta-text {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .lead-cta input[type="email"] {
    background: var(--void-surface);
    border: 1px solid var(--void-border);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    border-radius: 2px;
    width: 100%;
  }

  .lead-cta input[type="email"]:focus { border-color: var(--gold); }
  .lead-cta input[type="email"]::placeholder { color: var(--text-dim); }

  .cta-btn {
    border-color: var(--gold);
    color: var(--gold);
    width: 100%;
    padding: 12px;
  }

  .cta-btn:hover:not(:disabled) { background: var(--gold); color: var(--void); }

  .cta-success {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--teal);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 8px 0;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 6px;
    padding: 16px 20px;
    border: 1px solid var(--void-border);
    border-left: 2px solid var(--teal-dim);
    background: var(--void-mid);
    border-radius: 2px;
    width: fit-content;
  }

  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--teal-dim);
    animation: blink 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="header">
  <a class="header-brand" href="tools.html">Bhavé's Lab / The Chamber</a>
  <span class="header-indicator">
    <span class="pulse-dot"></span>
    <span id="status-text">INITIALIZED</span>
  </span>
</div>

<div id="app">
  <div class="chamber">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="messages" id="messages"></div>
    <div class="input-area" id="input-area">
      <textarea id="user-input" placeholder="Respond honestly. There are no correct answers." rows="3"></textarea>
      <div class="input-actions">
        <span class="q-counter" id="q-counter">01 / 21</span>
        <button id="send-btn" onclick="handleSend()">[ ENTER ]</button>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND = 'https://bhaveslab-backend.vercel.app';

const QUESTIONS = [
  "What brought you here today?",
  "What keeps pulling your attention lately?",
  "What situation continues to appear in your life?",
  "What problem are you attempting to solve?",
  "What would happen if that problem disappeared tomorrow?",
  "What has repeated more than once in your life?",
  "What story do you frequently tell about yourself?",
  "What frustrates you most often?",
  "What outcome do you secretly expect?",
  "What pattern do you suspect is operating beneath the surface?",
  "What emotional state do you spend the most time in?",
  "What emotion do you avoid?",
  "What state are you in before making important decisions?",
  "What belief seems to support that state?",
  "What would change if that belief disappeared?",
  "What do you already know?",
  "What truth have you delayed acting on?",
  "What decision remains unfinished?",
  "What are you currently negotiating with?",
  "What would happen if the negotiation ended today?",
  "What appears to be asking for your attention now?"
];

const SEQ = {
  0:  "SEQUENCE_01 — SIGNAL",
  5:  "SEQUENCE_02 — PATTERN",
  10: "SEQUENCE_03 — STATE",
  15: "SEQUENCE_04 — NEGOTIATION",
  20: "SEQUENCE_05 — DIRECTION"
};

const SYSTEM_PROMPT = `You are The Chamber's Reflection Engine inside Bhavé's Lab.

Your purpose is to analyze a user's 21 responses and generate a Chamber Reflection report.

RULES:
- Do not diagnose, prescribe, motivate, or fix.
- Do not use these terms: healing, toxic, high vibe, manifest, hustle, grind, coaching, therapy, transformation, journey, growth, spiritual, tribe, community.
- Do not tell the user what to do.
- Observe only. Reflect only. Name what appears.
- Be precise. Be direct. Not harsh. Not warm in a therapeutic way.
- Language is observational, not instructional.
- Use the word "study" not "learn". Use "awareness" not "consciousness growth".

OUTPUT FORMAT — return ONLY this JSON structure, no markdown, no preamble:
{
  "signal": "2-3 sentences on what appears to be calling for attention across the responses",
  "pattern": "2-3 sentences on what repeats — recurring words, emotions, situations",
  "state": "2-3 sentences on the dominant state influencing perception in these responses",
  "negotiation": "2-3 sentences on what the user appears to already know but continues to negotiate with",
  "direction": "2-3 sentences on what naturally emerges from the observations — not a prescription, just what is visible"
}`;

const WELCOME = "Welcome to The Chamber.\n\nThis is not a test.\n\nThis is not an assessment.\n\nThis is an observation.\n\nAnswer honestly.\n\nThere are no correct responses.";

let currentQ = 0;
let responses = [];
let sessionComplete = false;
let isLoading = false;
var lastReport = null;

const msgsEl    = document.getElementById('messages');
const inputEl   = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const qCounter  = document.getElementById('q-counter');
const progressEl = document.getElementById('progress');
const statusEl  = document.getElementById('status-text');

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Core message renderer ─────────────────────────────────────────────────
   Single function. Text set via textContent once. No innerHTML, no async
   DOM, no animation, no requestAnimationFrame.                             */
function addMsg(type, text) {
  var wrap = document.createElement('div');
  wrap.className = 'msg ' + type;

  if (type === 'chamber' || type === 'user') {
    var lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.textContent = type === 'chamber' ? 'CHAMBER' : 'INPUT_RECEIVED';
    wrap.appendChild(lbl);
  }

  var body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = text;
  wrap.appendChild(body);

  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return wrap;
}

function showTyping() {
  var wrap = document.createElement('div');
  wrap.id = 'typing';
  wrap.className = 'msg chamber';
  var dots = document.createElement('div');
  dots.className = 'typing-dots';
  for (var i = 0; i < 3; i++) dots.appendChild(document.createElement('span'));
  wrap.appendChild(dots);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typing');
  if (el) el.remove();
}

function updateProgress() {
  progressEl.style.width = Math.round((currentQ / 21) * 100) + '%';
  qCounter.textContent = String(currentQ + 1).padStart(2, '0') + ' / 21';
}

/* ── Report renderer — DOM methods throughout ────────────────────────────── */
function addReport(report) {
  var wrap = document.createElement('div');
  wrap.className = 'msg chamber';

  var lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = 'REFLECTION_COMPLETE';
  wrap.appendChild(lbl);

  var body = document.createElement('div');
  body.className = 'msg-body';

  var sections = [
    ['SIGNAL',      report.signal],
    ['PATTERN',     report.pattern],
    ['STATE',       report.state],
    ['NEGOTIATION', report.negotiation],
    ['DIRECTION',   report.direction]
  ];

  sections.forEach(function(pair, i) {
    var sec = document.createElement('div');
    sec.className = 'report-section';

    var secLbl = document.createElement('span');
    secLbl.className = 'report-label';
    secLbl.textContent = '[ ' + pair[0] + ' ]';
    sec.appendChild(secLbl);

    var txt = document.createElement('div');
    txt.className = 'report-text';
    txt.textContent = pair[1];
    sec.appendChild(txt);

    body.appendChild(sec);

    if (i < sections.length - 1) {
      var divider = document.createElement('div');
      divider.className = 'report-divider';
      body.appendChild(divider);
    }
  });

  var quote = document.createElement('div');
  quote.className = 'closing-quote';
  quote.textContent = '"The mystery is not the information.\nThe mystery is why we continue negotiating with what we already know."\n\n— Bhavé';
  body.appendChild(quote);

  wrap.appendChild(body);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

/* ── Init ────────────────────────────────────────────────────────────────── */
async function init() {
  sendBtn.disabled = true;
  addMsg('system', '[ CHAMBER INITIALIZED ]');
  await sleep(600);
  addMsg('chamber', WELCOME);
  await sleep(500);
  addMsg('system', '— ' + SEQ[0] + ' —');
  await sleep(300);
  addMsg('chamber', QUESTIONS[0]);
  sendBtn.disabled = false;
  inputEl.focus();
  updateProgress();
}

/* ── Send handler ────────────────────────────────────────────────────────── */
async function handleSend() {
  if (isLoading || sessionComplete) return;
  var val = inputEl.value.trim();
  if (!val) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.disabled = true;

  responses.push({ q: QUESTIONS[currentQ], a: val });
  addMsg('user', val);
  inputEl.value = '';
  currentQ++;
  updateProgress();

  if (currentQ < 21) {
    showTyping();
    await sleep(800 + Math.random() * 400);
    removeTyping();
    if (SEQ[currentQ]) {
      addMsg('system', '— ' + SEQ[currentQ] + ' —');
      await sleep(200);
    }
    addMsg('chamber', QUESTIONS[currentQ]);
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  } else {
    qCounter.textContent = 'GENERATING REFLECTION';
    statusEl.textContent = 'ANALYSIS_RUNNING';
    document.getElementById('input-area').style.display = 'none';
    showTyping();
    await sleep(500);
    removeTyping();
    addMsg('system', '[ REFLECTION ENGINE ENGAGED ]');
    showTyping();
    var report = await generateReport();
    lastReport = report;
    removeTyping();
    addReport(report);
    sessionComplete = true;
    statusEl.textContent = 'COMPLETE';
    progressEl.style.width = '100%';
    showLeadCapture();
  }
}

/* ── AI report ───────────────────────────────────────────────────────────── */
async function generateReport() {
  var text = responses.map(function(r, i) {
    return 'Q' + (i + 1) + ': ' + r.q + '\nA: ' + r.a;
  }).join('\n\n');

  try {
    var res = await fetch(BACKEND + '/api/reflect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input: 'Here are the 21 responses:\n\n' + text, systemPrompt: SYSTEM_PROMPT })
    });
    if (!res.ok) throw new Error('backend error');
    var data = await res.json();
    var clean = (data.text || '').replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch (e) {
    return {
      signal: "Something brought you here — and it wasn't random. The responses suggest something is actively seeking attention.",
      pattern: "A recurring structure appears across multiple answers. The same situation arrives in different forms.",
      state: "There is a dominant state present throughout these responses. It operates before decisions are made.",
      negotiation: "You appear to already know something. The responses show repeated contact with a recognition that hasn't fully landed.",
      direction: "What is asking for attention is already visible in what you wrote. No interpretation needed — just closer observation."
    };
  }
}

/* ── Lead capture ────────────────────────────────────────────────────────── */
function showLeadCapture() {
  var cta = document.createElement('div');
  cta.className = 'lead-cta';

  var ctaLbl = document.createElement('div');
  ctaLbl.className = 'lead-cta-label';
  ctaLbl.textContent = '[ CONTINUE THE STUDY ]';
  cta.appendChild(ctaLbl);

  var ctaTxt = document.createElement('div');
  ctaTxt.className = 'lead-cta-text';
  ctaTxt.textContent = 'Seven books. One framework. The full sequence — State through Source.\nEnter your email to receive the library.';
  cta.appendChild(ctaTxt);

  var emailInput = document.createElement('input');
  emailInput.type = 'email';
  emailInput.id = 'lead-email';
  emailInput.placeholder = 'Your email';
  cta.appendChild(emailInput);

  var btn = document.createElement('button');
  btn.className = 'cta-btn';
  btn.textContent = '[ SEND THE LIBRARY ]';
  btn.onclick = submitLead;
  cta.appendChild(btn);

  msgsEl.appendChild(cta);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function submitLead() {
  var emailInput = document.getElementById('lead-email');
  var email = emailInput.value.trim();
  if (!email || !email.includes('@')) {
    emailInput.style.borderColor = 'var(--gold)';
    return;
  }

  var btn = msgsEl.querySelector('.cta-btn');
  btn.disabled = true;
  btn.textContent = '[ LOGGING... ]';

  try {
    await fetch(BACKEND + '/api/chamber', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, report: lastReport })
    });
  } catch (e) { /* silent */ }

  btn.style.display = 'none';
  emailInput.style.display = 'none';
  var ok = document.createElement('div');
  ok.className = 'cta-success';
  ok.textContent = '[ SIGNAL_RECEIVED — CHECK YOUR INBOX ]';
  btn.parentNode.appendChild(ok);
}

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

init();
</script>
</body>
</html>
