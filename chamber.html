<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chamber — Bhavé's Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #050505;
    --void-mid: #0d0d0d;
    --void-surface: #141414;
    --void-border: #1e1e1e;
    --gold: #b8922a;
    --gold-light: #c8a96e;
    --teal: #3dd6c8;
    --teal-dim: #1a6b65;
    --text-primary: #e8e8e8;
    --text-dim: #6b6b6b;
    --text-mid: #999;
  }

  html, body {
    height: 100%;
    background: var(--void);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    overflow: hidden;
  }

  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  #app::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(61,214,200,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--void-border);
    background: var(--void);
    z-index: 10;
  }

  .header-brand {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-decoration: none;
  }

  .header-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .chamber {
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: calc(100vh - 100px);
    margin-top: 60px;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { display: none; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .msg.chamber .msg-label { color: var(--teal-dim); }
  .msg.user .msg-label { color: var(--gold); text-align: right; align-self: flex-end; }

  .msg-body {
    padding: 16px 20px;
    border: 1px solid var(--void-border);
    background: var(--void-surface);
    border-radius: 2px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
  }

  .msg.chamber .msg-body {
    border-left: 2px solid var(--teal-dim);
    background: var(--void-mid);
  }

  .msg.user .msg-body {
    border-right: 2px solid var(--gold);
    border-left: 1px solid var(--void-border);
    background: var(--void-surface);
    text-align: right;
  }

  .msg.system .msg-body {
    border: 1px solid var(--void-border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .progress-bar {
    height: 1px;
    background: var(--void-border);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-dim), var(--teal));
    transition: width 0.6s ease;
  }

  .input-area {
    border-top: 1px solid var(--void-border);
    padding-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  textarea {
    width: 100%;
    background: var(--void-surface);
    border: 1px solid var(--void-border);
    border-left: 2px solid var(--gold);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: none;
    outline: none;
    border-radius: 2px;
    min-height: 72px;
    max-height: 160px;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: #2a2a2a;
    border-left-color: var(--gold-light);
  }

  textarea::placeholder { color: var(--text-dim); font-style: italic; }

  .input-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .q-counter {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  button {
    background: transparent;
    border: 1px solid var(--teal-dim);
    color: var(--teal);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  button:hover:not(:disabled) {
    background: var(--teal);
    color: var(--void);
  }

  button:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .report-section { margin-bottom: 20px; }

  .report-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .report-text {
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.8;
  }

  .report-divider {
    height: 1px;
    background: var(--void-border);
    margin: 20px 0;
  }

  .closing-quote {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--void-border);
  }

  .lead-cta {
    margin-top: 12px;
    padding: 20px;
    border: 1px solid var(--gold);
    background: rgba(184, 146, 42, 0.04);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeIn 0.5s ease 0.3s forwards;
    opacity: 0;
  }

  .lead-cta-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .lead-cta-text {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.7;
  }

  .lead-cta input[type="email"] {
    background: var(--void-surface);
    border: 1px solid var(--void-border);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    border-radius: 2px;
    width: 100%;
  }

  .lead-cta input[type="email"]:focus { border-color: var(--gold); }
  .lead-cta input[type="email"]::placeholder { color: var(--text-dim); }

  .cta-btn {
    border-color: var(--gold);
    color: var(--gold);
    width: 100%;
    padding: 12px;
  }

  .cta-btn:hover:not(:disabled) {
    background: var(--gold);
    color: var(--void);
  }

  .cta-success {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--teal);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 8px 0;
  }

  .typing {
    display: flex;
    gap: 6px;
    padding: 16px 20px;
    border: 1px solid var(--void-border);
    border-left: 2px solid var(--teal-dim);
    background: var(--void-mid);
    border-radius: 2px;
    width: fit-content;
  }

  .typing span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--teal-dim);
    animation: blink 1.4s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<div class="header">
  <a class="header-brand" href="tools.html">Bhavé's Lab / The Chamber</a>
  <span class="header-indicator">
    <span class="pulse-dot"></span>
    <span id="status-text">INITIALIZED</span>
  </span>
</div>

<div id="app">
  <div class="chamber">
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area" id="input-area">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Respond honestly. There are no correct answers." rows="3"></textarea>
        <div class="input-actions">
          <span class="q-counter" id="q-counter">SIGNAL_01 / 21</span>
          <button id="send-btn" onclick="handleSend()">[ ENTER ]</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND = 'https://bhaveslab-backend.vercel.app';

const QUESTIONS = [
  "What brought you here today?",
  "What keeps pulling your attention lately?",
  "What situation continues to appear in your life?",
  "What problem are you attempting to solve?",
  "What would happen if that problem disappeared tomorrow?",
  "What has repeated more than once in your life?",
  "What story do you frequently tell about yourself?",
  "What frustrates you most often?",
  "What outcome do you secretly expect?",
  "What pattern do you suspect is operating beneath the surface?",
  "What emotional state do you spend the most time in?",
  "What emotion do you avoid?",
  "What state are you in before making important decisions?",
  "What belief seems to support that state?",
  "What would change if that belief disappeared?",
  "What do you already know?",
  "What truth have you delayed acting on?",
  "What decision remains unfinished?",
  "What are you currently negotiating with?",
  "What would happen if the negotiation ended today?",
  "What appears to be asking for your attention now?"
];

const SEQUENCE_LABELS = {
  0:  "SEQUENCE_01 — SIGNAL",
  5:  "SEQUENCE_02 — PATTERN",
  10: "SEQUENCE_03 — STATE",
  15: "SEQUENCE_04 — NEGOTIATION",
  20: "SEQUENCE_05 — DIRECTION"
};

const SYSTEM_PROMPT = `You are The Chamber's Reflection Engine inside Bhavé's Lab.

Your purpose is to analyze a user's 21 responses and generate a Chamber Reflection report.

RULES:
- Do not diagnose, prescribe, motivate, or fix.
- Do not use these terms: healing, toxic, high vibe, manifest, hustle, grind, coaching, therapy, transformation, journey, growth, spiritual, tribe, community.
- Do not tell the user what to do.
- Observe only. Reflect only. Name what appears.
- Be precise. Be direct. Not harsh. Not warm in a therapeutic way.
- Language is observational, not instructional.
- Use the word "study" not "learn". Use "awareness" not "consciousness growth".

OUTPUT FORMAT — return ONLY this JSON structure, no markdown, no preamble:
{
  "signal": "2-3 sentences on what appears to be calling for attention across the responses",
  "pattern": "2-3 sentences on what repeats — recurring words, emotions, situations",
  "state": "2-3 sentences on the dominant state influencing perception in these responses",
  "negotiation": "2-3 sentences on what the user appears to already know but continues to negotiate with",
  "direction": "2-3 sentences on what naturally emerges from the observations — not a prescription, just what is visible"
}`;

let currentQ = 0;
let responses = [];
let sessionComplete = false;
let isLoading = false;

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const qCounter   = document.getElementById('q-counter');
const progressEl = document.getElementById('progress');
const statusEl   = document.getElementById('status-text');

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function appendMsg(type, content, delay) {
  return new Promise(async resolve => {
    if (delay) await sleep(delay);
    const el = document.createElement('div');
    el.className = `msg ${type}`;
    if (type === 'chamber') {
      el.innerHTML = `<span class="msg-label">CHAMBER</span><div class="msg-body">${content}</div>`;
    } else if (type === 'user') {
      el.innerHTML = `<span class="msg-label">INPUT_RECEIVED</span><div class="msg-body">${escHtml(content)}</div>`;
    } else {
      el.innerHTML = `<div class="msg-body">${content}</div>`;
    }
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    resolve();
  });
}

function showTyping() {
  const el = document.createElement('div');
  el.id = 'typing-indicator';
  el.className = 'msg chamber';
  el.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function updateProgress() {
  progressEl.style.width = Math.round((currentQ / 21) * 100) + '%';
  if (currentQ < 21) {
    qCounter.textContent = `SIGNAL_${String(currentQ + 1).padStart(2,'0')} / 21`;
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function init() {
  sendBtn.disabled = true;
  await appendMsg('system', '[ CHAMBER INITIALIZED ]', 200);
  await sleep(800);
  await appendMsg('chamber', `Welcome to The Chamber.\n\nThis is not a test.\n\nThis is not an assessment.\n\nThis is an observation.\n\nAnswer honestly.\n\nThere are no correct responses.`.replace(/\n/g,'<br>'), 300);
  await sleep(600);
  if (SEQUENCE_LABELS[0]) await appendMsg('system', `— ${SEQUENCE_LABELS[0]} —`, 100);
  await sleep(300);
  await appendMsg('chamber', QUESTIONS[0], 400);
  sendBtn.disabled = false;
  inputEl.focus();
  updateProgress();
}

async function handleSend() {
  if (isLoading || sessionComplete) return;
  const val = inputEl.value.trim();
  if (!val) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.disabled = true;

  responses.push({ q: QUESTIONS[currentQ], a: val });
  await appendMsg('user', val);
  inputEl.value = '';
  currentQ++;
  updateProgress();

  if (currentQ < 21) {
    showTyping();
    await sleep(900 + Math.random() * 400);
    removeTyping();
    if (SEQUENCE_LABELS[currentQ]) {
      await appendMsg('system', `— ${SEQUENCE_LABELS[currentQ]} —`, 100);
      await sleep(300);
    }
    await appendMsg('chamber', QUESTIONS[currentQ], 100);
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  } else {
    qCounter.textContent = 'GENERATING REFLECTION';
    statusEl.textContent = 'ANALYSIS_RUNNING';
    document.getElementById('input-area').style.display = 'none';
    showTyping();
    await sleep(600);
    removeTyping();
    await appendMsg('system', '— REFLECTION ENGINE ENGAGED —', 100);
    showTyping();
    const report = await generateReport(responses);
    removeTyping();
    await renderReport(report);
    sessionComplete = true;
    statusEl.textContent = 'COMPLETE';
    progressEl.style.width = '100%';
    showLeadCapture();
  }
}

async function generateReport(responses) {
  const responseText = responses.map((r, i) => `Q${i+1}: ${r.q}\nA: ${r.a}`).join('\n\n');
  try {
    const res = await fetch(`${BACKEND}/api/reflect`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input: `Here are the 21 responses:\n\n${responseText}`, systemPrompt: SYSTEM_PROMPT })
    });
    if (!res.ok) throw new Error('backend error');
    const data = await res.json();
    const clean = (data.text || '').replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) {
    return {
      signal: "Something brought you here — and it wasn't random. The responses suggest something is actively seeking attention.",
      pattern: "A recurring structure appears across multiple answers. The same situation arrives in different forms.",
      state: "There is a dominant state present throughout these responses. It operates before decisions are made.",
      negotiation: "You appear to already know something. The responses show repeated contact with a recognition that hasn't fully landed.",
      direction: "What is asking for attention is already visible in what you wrote. No interpretation needed — just closer observation."
    };
  }
}

async function renderReport(report) {
  const html = `
    <div class="report-section">
      <span class="report-label">[ SIGNAL ]</span>
      <div class="report-text">${escHtml(report.signal)}</div>
    </div>
    <div class="report-divider"></div>
    <div class="report-section">
      <span class="report-label">[ PATTERN ]</span>
      <div class="report-text">${escHtml(report.pattern)}</div>
    </div>
    <div class="report-divider"></div>
    <div class="report-section">
      <span class="report-label">[ STATE ]</span>
      <div class="report-text">${escHtml(report.state)}</div>
    </div>
    <div class="report-divider"></div>
    <div class="report-section">
      <span class="report-label">[ NEGOTIATION ]</span>
      <div class="report-text">${escHtml(report.negotiation)}</div>
    </div>
    <div class="report-divider"></div>
    <div class="report-section">
      <span class="report-label">[ DIRECTION ]</span>
      <div class="report-text">${escHtml(report.direction)}</div>
    </div>
    <div class="closing-quote">"The mystery is not the information.<br>The mystery is why we continue negotiating with what we already know."<br><br>— Bhavé</div>`;

  await appendMsg('system', '[ CHAMBER REFLECTION ]', 200);
  const reportEl = document.createElement('div');
  reportEl.className = 'msg chamber';
  reportEl.style.animationDelay = '0.1s';
  reportEl.innerHTML = `<span class="msg-label">REFLECTION_COMPLETE</span><div class="msg-body">${html}</div>`;
  messagesEl.appendChild(reportEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  await sleep(300);
}

function showLeadCapture() {
  const cta = document.createElement('div');
  cta.className = 'lead-cta';
  cta.innerHTML = `
    <span class="lead-cta-label">[ CONTINUE THE STUDY ]</span>
    <div class="lead-cta-text">Seven books. One framework. The full sequence — State through Source.<br>Enter your email to receive the library.</div>
    <input type="email" id="lead-email" placeholder="Your email" />
    <button class="cta-btn" id="lead-btn" onclick="submitLead()">[ SEND THE LIBRARY ]</button>
  `;
  messagesEl.appendChild(cta);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function submitLead() {
  const email = document.getElementById('lead-email').value.trim();
  const emailInput = document.getElementById('lead-email');
  if (!email || !email.includes('@')) {
    emailInput.style.borderColor = 'var(--gold)';
    return;
  }
  const btn = document.getElementById('lead-btn');
  btn.disabled = true;
  btn.textContent = '[ LOGGING... ]';

  try {
    await fetch(`${BACKEND}/api/notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, source: 'the-chamber' })
    });
  } catch(e) { /* silent — still show success */ }

  btn.style.display = 'none';
  emailInput.style.display = 'none';
  const success = document.createElement('div');
  success.className = 'cta-success';
  success.textContent = '[ SIGNAL_RECEIVED — CHECK YOUR INBOX ]';
  btn.parentNode.appendChild(success);
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

init();
</script>
</body>
</html>
